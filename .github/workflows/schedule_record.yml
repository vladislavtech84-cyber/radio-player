name: Radio Test 19-20

on:
  schedule:
    # Запуск ровно в 19:20 по МСК (16:20 по UTC)
    - cron: '20 16 * * *'
  workflow_dispatch:

jobs:
  test_job:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Run Recording
      run: python record.py

    - name: Push File
      run: |
        git config --global user.name "Radio-Bot"
        git config --global user.email "radio-bot@github.com"
        git add part_*.mp3
        git commit -m "Тест 19:20 записан [skip ci]" || echo "Нет изменений"
        git push
