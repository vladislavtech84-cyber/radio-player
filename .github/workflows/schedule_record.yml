name: Radio Test 10 Mins

on:
  schedule:
    # Запуск ровно в 12:40 по МСК (09:40 по UTC)
    - cron: '40 9 * * *'
  workflow_dispatch: # Кнопка для ручного запуска

jobs:
  test_job:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Run Recording
      # Запускаем запись строго на 600 секунд (10 минут)
      run: python record.py 600

    - name: Push File
      run: |
        git config --global user.name "Radio-Bot"
        git config --global user.email "radio-bot@github.com"
        git add part_1.mp3
        git commit -m "Тест 10 минут записан [skip ci]" || echo "Нет изменений"
        git push
