name: Night Radio Archive

on:
  schedule:
    # Часть 1: запуск в 18:00 по МСК (15:00 UTC)
    - cron: '0 15 * * *'
    # Часть 2: запуск в 21:30 по МСК (18:30 UTC)
    - cron: '30 18 * * *'
  workflow_dispatch:

jobs:
  record_marathon:
    runs-on: ubuntu-latest
    timeout-minutes: 240 # Лимит 4 часа на запуск
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Run Recording
      # Скрипт сам поймет по времени, какую часть записывать (каждая по 12600 сек = 3.5 часа)
      run: python record.py 12600

    - name: Save Audio to Repo
      run: |
        git config --global user.name "Radio-Bot"
        git config --global user.email "radio-bot@github.com"
        git add part_1.mp3 part_2.mp3
        git commit -m "Обновлен ночной архив радио [skip ci]" || echo "Нет изменений"
        git push
