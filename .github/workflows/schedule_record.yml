name: Radio Timer Test 10 Mins

on:
  schedule:
    # Автоматический запуск строго в 12:40 по МСК (09:40 по UTC)
    - cron: '40 9 * * *'

jobs:
  timer_job:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Run Recording
      run: python record.py

    - name: Push File
      run: |
        git config --global user.name "Radio-Bot"
        git config --global user.email "radio-bot@github.com"
        git add part_*.mp3
        git commit -m "Авто-таймер 10 минут сработал [skip ci]" || echo "Нет изменений"
        git push
