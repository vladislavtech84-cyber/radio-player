name: Radio Timer Test 13-10

on:
  schedule:
    # Запуск строго в 13:10 по МСК (10:10 по UTC)
    - cron: '10 10 * * *'
  workflow_dispatch: # Позволяет при необходимости запустить вручную

jobs:
  timer_job:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Run Recording
      run: python record.py

    - name: Push File
      run: |
        git config --global user.name "Radio-Bot"
        git config --global user.email "radio-bot@github.com"
        git add part_*.mp3
        git commit -m "Запись по таймеру 13:10 готова [skip ci]" || echo "Нет изменений"
        git push
