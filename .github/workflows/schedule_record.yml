name: Record Radio Schedule

on:
  workflow_dispatch: # Оставляем только кнопку для ручного запуска теста

jobs:
  record:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: pip install requests

    - name: Run recording script
      run: python record.py

    - name: Commit and Push recorded file
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@://github.com"
        git add *.mp3
        git commit -m "Manual test record: $(date +'%Y-%m-%d %H:%M')" || echo "No changes to commit"
        git push
