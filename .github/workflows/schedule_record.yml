name: Radio Timer Recorder and Auto-Clean

on:
  schedule:
    # Робот запускается в 8,10,12,14,16,18,20,22 по Москве (минус 3 часа для UTC)
    - cron: '0 5,7,9,11,13,15,17,19 * * *'
  workflow_dispatch: # Кнопка ручного запуска в Actions

jobs:
  record_and_clean:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Полная история для корректного удаления файлов

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Run Recorder Script
      run: python record.py

    - name: Auto-Clean Old Files (Older than 24 hours)
      run: |
        python -c '
        import os, time
        now = time.time()
        cutoff = now - (24 * 3600) # Граница: 24 часа назад
        deleted_any = False
        
        for f in os.listdir("."):
            if f.startswith("record_") and f.endswith(".mp3"):
                # Получаем время создания файла по его timestamp в названии
                try:
                    file_time = int(f.split("_")[1].split(".")[0])
                    if file_time < cutoff:
                        os.remove(f)
                        print(f"Старый файл удален автоматически: {f}")
                        deleted_any = True
                except:
                    pass
        '

    - name: Commit and Push Changes
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add *.mp3
        # Фиксируем изменения, если добавились новые файлы или удалились старые через сутки
        git commit -m "Автоматическая запись радио и очистка старого архива" || exit 0
        git push
