name: Radio Recorder Automated

on:
  workflow_dispatch:
  repository_dispatch:
    types: [start_recording]

jobs:
  build_and_record:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install PyPi Libraries
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Execute Python Recording Script
      run: python record.py

    - name: Save Audio File to GitHub Repository
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Radio Bot"
        git add *.mp3
        git diff --quiet && git diff --staged --quiet || (git commit -m "Добавлена новая запись эфира радио" && git push)
