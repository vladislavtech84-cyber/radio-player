name: Record Radio Schedule

on:
  schedule:
    # Автоматический запуск ровно в 14:10 по Московскому времени (11:10 UTC)
    - cron: '10 11 * * *'
  workflow_dispatch: # Кнопка ручного запуска на всякий случай

jobs:
  record:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: pip install requests

    - name: Run recording script
      run: python record.py

    - name: Commit and Push recorded file
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@://github.com"
        git add test_record.mp3
        git commit -m "Automated test record at 14:10" || echo "No changes"
        git push
