name: Расписание Записи Радио

on:
  workflow_dispatch: # Позволяет запускать процесс вручную кнопкой в любое время
  schedule:
    # Автоматический запуск (опционально). Сейчас настроен на запуск каждый день в 00:00 UTC
    - cron: '0 0 * * *'

jobs:
  record_audio:
    runs-on: ubuntu-latest

    steps:
    - name: Проверка репозитория
      uses: actions/checkout@v4

    - name: Установка FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Запись потока (1 час)
      run: |
        # -t 3600 — запись идет ровно 1 час
        # -segment_time 1800 — делит часовой эфир на 2 файла по 30 минут, чтобы не превысить лимиты GitHub
        ffmpeg -i "https://radio.5-tv.ru/radio.mp3" -t 3600 -c copy -f segment -segment_time 1800 -strftime 1 "radio_%Y%m%d_%H%M%S.mp3"

    - name: Сохранение аудиофайлов в репозиторий
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@://github.com"
        git add radio_*.mp3
        git commit -m "Добавлен 1 час архивной записи радио"
        git push
