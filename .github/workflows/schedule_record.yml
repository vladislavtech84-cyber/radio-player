name: Radio Timer Recorder and Auto-Clean

on:
  schedule:
    # ТЕСТ: Робот будет просыпаться КАЖДУЮ МИНУТУ, начиная с 19:30 по UTC (22:30 по Москве)
    - cron: '* 19 * * *'
  workflow_dispatch:

jobs:
  record_and_clean:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Run Recorder Script
      run: python record.py

    # ТЕСТ ОЧИСТКИ: Удаляем файлы, которые старше 3 минут, чтобы увидеть авто-очистку прямо сейчас!
    - name: Auto-Clean Old Files (Older than 3 minutes)
      run: |
        python -c '
        import os, time
        now = time.time()
        cutoff = now - 180 # 3 минуты в секундах
        for f in os.listdir("."):
            if f.startswith("record_") and f.endswith(".mp3"):
                try:
                    timestamp_part = f.replace("record_", "").replace(".mp3", "")
                    if int(timestamp_part) < cutoff:
                        os.remove(f)
                        print(f"Тестовый файл удален: {f}")
                except:
                    pass
        '

    - name: Commit and Push Changes
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add *.mp3
        git commit -m "Тестовый минутный запуск" || exit 0
        git push
