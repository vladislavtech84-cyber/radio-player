name: Record Radio Schedule

on:
  schedule:
    # Запуск в 00 минут выбранных часов (по МСК: 8, 10, 12, 14, 16, 18, 20, 22)
    - cron: '0 5,7,9,11,13,15,17,19 * * *'
  workflow_dispatch: # Кнопка для ручного запуска теста

jobs:
  record:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: pip install requests

    - name: Run recording script
      run: python record.py

    - name: Commit and Push recorded file
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@://github.com"
        git add *.mp3
        git commit -m "Auto-record: $(date +'%Y-%m-%d %H:%M')" || echo "No changes to commit"
        git push
