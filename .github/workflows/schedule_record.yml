
name: Запись Радио Эфира

on:
  workflow_dispatch: # Позволяет запускать запись вручную кнопкой

jobs:
  record:
    runs-on: ubuntu-latest

    steps:
    - name: Проверка репозитория
      uses: actions/checkout@v4

    - name: Установка FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Запись потока (Часть 1 — 5 часов)
      run: |
        # Запись идет 5 часов (18000 секунд) частями по 30 минут (1800 секунд)
        ffmpeg -i "https://radio.5-tv.ru/radio.mp3" -t 18000 -c copy -f segment -segment_time 1800 -strftime 1 "radio_%Y%m%d_%H%M%S.mp3"

    - name: Сохранение файлов в репозиторий
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@://github.com"
        git add radio_*.mp3
        git commit -m "Добавлены архивные записи радио (5 часов)"
        git push
