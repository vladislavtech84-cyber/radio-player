name: Тестовая Запись Радио

on:
  workflow_dispatch: # Позволяет запускать запись вручную кнопкой

jobs:
  record:
    runs-on: ubuntu-latest

    steps:
    - name: Проверка репозитория
      uses: actions/checkout@v4

    - name: Установка FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Тестовая запись (1 минута)
      run: |
        # Запись идет ровно 60 секунд для проверки звука
        ffmpeg -i "https://radio.5-tv.ru/radio.mp3" -t 60 -c copy -f segment -segment_time 60 -strftime 1 "radio_%Y%m%d_%H%M%S.mp3"

    - name: Сохранение тестового файла в репозиторий
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@://github.com"
        git add radio_*.mp3
        git commit -m "Добавлен тестовый фрагмент радио"
        git push
