name: Расписание Записи Радио

on:
  workflow_dispatch: # Оставляем кнопку для ручного запуска
  schedule:
    # Запуск каждый день в 18:25 UTC (что соответствует 21:25 по МСК)
    - cron: '25 18 * * *'

jobs:
  record_audio:
    runs-on: ubuntu-latest

    steps:
    - name: Проверка репозитория
      uses: actions/checkout@v4

    - name: Установка FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Запись потока (1 час)
      run: |
        # Запись идет ровно 1 час (3600 секунд)
        ffmpeg -i "https://radio.5-tv.ru/radio.mp3" -t 3600 -c copy -f segment -segment_time 1800 -strftime 1 "radio_%Y%m%d_%H%M%S.mp3"

    - name: Сохранение аудиофайлов в репозиторий
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@://github.com"
        git add radio_*.mp3
        git commit -m "Добавлен 1 час архивной записи радио по расписанию"
        git push
