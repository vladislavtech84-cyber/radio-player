name: Radio Test 8 Cycles

on:
  schedule:
    # Запуск ровно в 16:55 по МСК (13:55 UTC)
    - cron: '55 13 * * *'
  workflow_dispatch:

jobs:
  test_record:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Run 8 cycles of 1 minute
      # Запускаем скрипт, передавая ему количество циклов (8) и длину цикла (60 сек)
      run: python record.py 8 60

    - name: Push to GitHub
      run: |
        git config --global user.name "Radio-Bot"
        git config --global user.email "radio-bot@github.com"
        git add *.mp3
        git commit -m "Тест: 8 циклов записи завершены [skip ci]" || echo "Нет изменений"
        git push
