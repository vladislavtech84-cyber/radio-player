name: Radio Timer 10 Min Test

on:
  schedule:
    # Запуск авто-таймера ровно в 16:00 по МСК (13:00 UTC)
    - cron: '0 13 * * *'
  workflow_dispatch: # Кнопка ручного запуска на всякий случай

jobs:
  recording_job:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Run Recording
      run: python record.py

    - name: Push Files
      run: |
        git config --global user.name "Radio-Bot"
        git config --global user.email "radio-bot@github.com"
        git add test_timer.mp3
        git commit -m "Тест таймера 10 минут успешно записан [skip ci]" || echo "Нет изменений"
        git push
