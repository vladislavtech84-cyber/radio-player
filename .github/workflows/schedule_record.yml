name: Radio Test 13-05

on:
  schedule:
    # Запуск ровно в 13:05 по МСК (10:05 по UTC)
    - cron: '5 10 * * *'
  workflow_dispatch: # Кнопка ручного запуска

jobs:
  test_job:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Run Recording
      # Запись идет ровно 600 секунд (10 минут)
      run: python record.py 600

    - name: Push File
      run: |
        git config --global user.name "Radio-Bot"
        git config --global user.email "radio-bot@github.com"
        git add part_1.mp3
        git commit -m "Тест 13:05 записан [skip ci]" || echo "Нет изменений"
        git push
