name: Record Radio Schedule

on:
  schedule:
    # Запуск ровно в 13:50 по МСК (10:50 по UTC)
    - cron: '50 10 * * *'
  workflow_dispatch:

jobs:
  record:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: pip install requests

    - name: Run recording script
      run: python record.py

    - name: Commit and Push recorded file
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@://github.com"
        git add test_record.mp3
        git commit -m "Test record at 13:50" || echo "No changes"
        git push
