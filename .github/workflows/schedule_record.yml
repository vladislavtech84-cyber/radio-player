name: Radio Test 18-00

on:
  schedule:
    # Запуск ровно в 18:00 по МСК (15:00 по UTC)
    - cron: '0 15 * * *'
  workflow_dispatch: # Оставляем кнопку ручного запуска

jobs:
  test_job:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Run Recording
      run: python record.py

    - name: Push File
      run: |
        git config --global user.name "Radio-Bot"
        git config --global user.email "radio-bot@github.com"
        git add part_1.mp3
        git commit -m "Тест 18:00 записан [skip ci]" || echo "Нет изменений"
        git push
