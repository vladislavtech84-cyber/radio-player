name: Radio Auto Download Archive

on:
  schedule:
    # Автоматический запуск строго в 15:45 по МСК (12:45 по UTC)
    - cron: '45 12 * * *'
  workflow_dispatch: # Кнопка ручного запуска на случай задержки cron

jobs:
  recording_process:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Run Recording
      run: python record.py

    - name: Push File to Repo
      run: |
        git config --global user.name "Radio-Bot"
        git config --global user.email "radio-bot@github.com"
        git add *.mp3
        git commit -m "Добавлена новая готовая запись [skip ci]" || echo "Нет изменений"
        git push
