name: Radio Auto Download Archive

on:
  schedule:
    # Запуск строго в 15:25 по МСК (12:25 по UTC)
    - cron: '25 12 * * *'
  workflow_dispatch: # Кнопка ручного запуска на случай, если cron задержится

jobs:
  recording_process:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Run Recording
      run: python record.py

    - name: Push File to Repo
      run: |
        git config --global user.name "Radio-Bot"
        git config --global user.email "radio-bot@github.com"
        git add *.mp3
        git commit -m "Добавлена новая готовая запись [skip ci]" || echo "Нет изменений"
        git push
