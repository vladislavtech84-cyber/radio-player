name: Radio Test 22-15

on:
  schedule:
    # Запуск ровно в 22:15 по МСК (19:15 по UTC)
    - cron: '15 19 * * *'
  workflow_dispatch:

jobs:
  test_job:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Run Recording
      run: python record.py

    - name: Push File
      run: |
        git config --global user.name "Radio-Bot"
        git config --global user.email "radio-bot@github.com"
        git add part_*.mp3
        git commit -m "Тест 22:15 записан [skip ci]" || echo "Нет изменений"
        git push
