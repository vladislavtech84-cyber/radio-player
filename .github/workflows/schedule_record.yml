name: Radio Timer Recorder

on:
  schedule:
    # Запуск ровно в 00 минут указанных часов по UTC (соответствует 8,10,12,14,16,18,20,22 по Москве)
    - cron: '0 5,7,9,11,13,15,17,19 * * *'
  workflow_dispatch: # Кнопка ручного старта в панели Actions

jobs:
  record:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Run Recorder
      run: python record.py

    - name: Commit and Push Record
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add *.mp3
        git commit -m "Добавлена автоматическая запись радио (1 час)" || exit 0
        git push
