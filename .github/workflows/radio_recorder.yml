name: Scheduled Radio Recorder

on:
  schedule:
    - cron: '0 11,13 * * *'
  workflow_dispatch:

jobs:
  record_stream:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Record Radio Stream
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "Ручной запуск: пишем тест на 15 секунд"
          ffmpeg -i "https://5-tv.ru" -t 15 -c copy record.mp3
        else
          CURRENT_HOUR=$(date +%H)
          echo "Запуск по расписанию. Час UTC: $CURRENT_HOUR"
          
          if [ "$CURRENT_HOUR" -eq 11 ]; then
            ffmpeg -i "https://5-tv.ru" -t 3600 -c copy record.mp3
          elif [ "$CURRENT_HOUR" -eq 13 ]; then
            ffmpeg -i "https://5-tv.ru" -t 18000 -c copy record.mp3
          fi
        fi

    - name: Save and Upload to Site
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        git add record.mp3
        git commit -m "Обновлена запись эфира: $(date +'%Y-%m-%d %H:%M')" || exit 0
        git push
