name: Hourly Radio Recorder

on:
  schedule:
    # Запуск 5 раз в день по МСК: в 08:00, 11:00, 14:00, 17:00, 20:00
    # Время в cron указывается по UTC (МСК минус 3 часа)
    - cron: '0 5 * * *'
    - cron: '0 8 * * *'
    - cron: '0 11 * * *'
    - cron: '0 14 * * *'
    - cron: '0 17 * * *'
  workflow_dispatch: # Кнопка для ручного теста

jobs:
  record-hour:
    runs-on: ubuntu-latest
    
    steps:
    - name: Install Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg python3-requests

    - name: Record and Upload Audio
      env:
        WEBAPP_URL: ${{ secrets.GOOGLE_WEBAPP_URL }}
      run: |
        export TZ="Europe/Moscow"
        CURRENT_HOUR=$(date +%H)
        
        # Определяем номер программы по времени её старта
        if [ "$CURRENT_HOUR" -eq "08" ] || [ "$CURRENT_HOUR" -eq "09" ]; then PROG_NUM=1;
        elif [ "$CURRENT_HOUR" -eq "11" ] || [ "$CURRENT_HOUR" -eq "12" ]; then PROG_NUM=2;
        elif [ "$CURRENT_HOUR" -eq "14" ] || [ "$CURRENT_HOUR" -eq "15" ] ; then PROG_NUM=3;
        elif [ "$CURRENT_HOUR" -eq "17" ] || [ "$CURRENT_HOUR" -eq "18" ]; then PROG_NUM=4;
        else PROG_NUM=5; fi
        
        FILE_NAME="program_${PROG_NUM}.mp3"
        
        echo "Запуск записи радио для программы №${PROG_NUM}..."
        
        # Записываем поток с флагами авто-переподключения при сбое сети
        ffmpeg -reconnect 1 -reconnect_at_eof 1 -reconnect_streamed 1 -reconnect_delay_max 5 \
               -i "https://radiokrug.ru/radio/vanya/icecast.audio" \
               -t 3600 -acodec libmp3lame -b:a 128k "$FILE_NAME" -y || true
        
        echo "Запись завершена или остановлена. Отправка файла в Google Диск..."
        
        # Проверяем, создался ли файл, и если он есть — отправляем в Google
        python3 -c "
        import os, base64, requests
        if os.path.exists('$FILE_NAME') and os.path.getsize('$FILE_NAME') > 0:
            with open('$FILE_NAME', 'rb') as f:
                encoded = base64.b64encode(f.read()).decode('utf-8')
            res = requests.post(os.environ['WEBAPP_URL'], json={'fileName': '$FILE_NAME', 'fileBytes': encoded})
            print('Ответ сервера:', res.text)
        else:
            print('Ошибка: Файл записи пуст или не был создан.')
        "
