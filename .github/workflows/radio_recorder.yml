name: RadioRecord

on:
  schedule:
    # Автоматический запуск каждый день в 13:00 UTC (это ровно 16:00 по Москве)
    - cron: '0 13 * * *'
  workflow_dispatch: # Кнопка для ручного запуска в любое время

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg curl

    - name: Record Stream
      run: |
        FILENAME="Radio_$(date +'%d-%m-%Y').mp3"
        # Скачиваем поток с маскировкой под реальный плеер (User-Agent), пишем 1 час (3600 секунд)
        curl -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" -s "https://hostingradio.ru" --max-time 3600 -o "$FILENAME" || true

    - name: Save to GitHub
      run: |
        git config --global user.name "RadioBot"
        git config --global user.email "bot@github.com"
        git add *.mp3
        git commit -m "Добавлен архив за $(date +'%d-%m-%Y')" || exit 0
        git push
