name: RadioRecord

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Record Stream
      run: |
        FILENAME="Radio_$(date +'%d-%m-%Y').mp3"
        # Используем мощный wget с маскировкой под плеер, пишем ровно 1 час (3600 секунд)
        wget -U "Mozilla/5.0" --timeout=3600 "https://5-tv.ru" -O "$FILENAME" || true

    - name: Save to GitHub
      run: |
        git config --global user.name "RadioBot"
        git config --global user.email "bot@github.com"
        git add *.mp3
        git commit -m "Добавлен архив за $(date +'%d-%m-%Y')" || exit 0
        git push
