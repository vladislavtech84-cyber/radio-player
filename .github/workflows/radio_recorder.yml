name: Scheduled Radio Recorder

on:
  schedule:
    # Робот автоматически включится каждый день ровно в 13:00 UTC (16:00 МСК)
    - cron: '0 13 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  record_stream:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Record Radio Stream
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "Ручной запуск: пишем тест на 15 секунд"
          ffmpeg -i "https://5-tv.ru" -t 15 -c copy record.mp3
        else
          CURRENT_HOUR=$(date +%H)
          echo "Запуск по расписанию. Час UTC: $CURRENT_HOUR"
          
          if [ "$CURRENT_HOUR" -eq 13 ]; then
            # В 16:00 МСК — непрерывно записываем 8 часов (28800 секунд) до 00:00 ночи
            ffmpeg -i "https://5-tv.ru" -t 28800 -c copy record.mp3
          fi
        fi

    - name: Save and Upload to Site
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        git add record.mp3
        git commit -m "Обновлен 8-часовой архив эфира" || exit 0
        git push origin main
