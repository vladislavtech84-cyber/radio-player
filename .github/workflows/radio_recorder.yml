name: Hourly Radio Recorder

on:
  schedule:
    # Запуск 5 раз в день по МСК: в 08:00, 11:00, 14:00, 17:00, 20:00
    - cron: '0 5 * * *'
    - cron: '0 8 * * *'
    - cron: '0 11 * * *'
    - cron: '0 14 * * *'
    - cron: '0 17 * * *'
  workflow_dispatch: # Кнопка для ручного теста

jobs:
  record-hour:
    runs-on: ubuntu-latest
    
    steps:
    # 1. Скачиваем текущие файлы сайта, чтобы добавить к ним новую запись
    - name: Checkout repo
      uses: actions/checkout@v4

    # 2. Устанавливаем утилиту записи
    - name: Install Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    # 3. Записываем 1 час эфира (Радио Ваня для стабильности)
    - name: Record Audio
      run: |
        export TZ="Europe/Moscow"
        CURRENT_HOUR=$(date +%H)
        
        if [ "$CURRENT_HOUR" -eq "08" ] || [ "$CURRENT_HOUR" -eq "09" ]; then PROG_NUM=1;
        elif [ "$CURRENT_HOUR" -eq "11" ] || [ "$CURRENT_HOUR" -eq "12" ]; then PROG_NUM=2;
        elif [ "$CURRENT_HOUR" -eq "14" ] || [ "$CURRENT_HOUR" -eq "15" ] ; then PROG_NUM=3;
        elif [ "$CURRENT_HOUR" -eq "17" ] || [ "$CURRENT_HOUR" -eq "18" ]; then PROG_NUM=4;
        else PROG_NUM=5; fi
        
        # Записываем ровно 1 час (3600 секунд) аудио
        ffmpeg -reconnect 1 -reconnect_at_eof 1 -reconnect_streamed 1 -reconnect_delay_max 5 \
               -i "https://radiokrug.ru" \
               -t 3600 -acodec libmp3lame -b:a 128k "program_${PROG_NUM}.mp3" -y || true

    # 4. Автоматически сохраняем готовый файл прямо в репозиторий GitHub
    - name: Save File to GitHub
      run: |
        git config --global user.name "Radio-Bot"
        git config --global user.email "bot@github.com"
        git add *.mp3
        git commit -m "Авто-обновление записи эфира" || exit 0
        git push
