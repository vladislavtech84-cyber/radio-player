name: RadioRecord

on:
  schedule:
    # Автоматический запуск каждый день в 13:00 UTC (это ровно 16:00 по Москве)
    - cron: '0 13 * * *'
  workflow_dispatch: # Кнопка для ручного запуска в любое время

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Record
      run: |
        sudo apt-get update && sudo apt-get install -y ffmpeg
        FILENAME="Radio_$(date +'%d-%m-%Y').mp3"
        # Запись потока ровно 1 час (3600 секунд) в один MP3 файл
        ffmpeg -i "https://hostingradio.ru" -t 3600 -acodec copy "$FILENAME"

    - name: Save
      run: |
        git config --global user.name "RadioBot"
        git config --global user.email "bot@github.com"
        git add *.mp3
        git commit -m "Save radio archive" || exit 0
        git push
