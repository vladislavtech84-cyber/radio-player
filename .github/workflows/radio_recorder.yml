name: Daily Radio Recorder

on:
  schedule:
    # Запуск каждый день в 18:00 по UTC (это ровно 21:00 по Московскому времени)
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  record_stream:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Record Radio until 1 AM
      # 14400 секунд — это ровно 4 часа записи (с 21:00 до 01:00 ночи)
      run: |
        timeout 14400 ffmpeg -i "https://5-tv.ru" -c copy record.mp3 || true

    - name: Save and Upload to Site
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        git add record.mp3
        git commit -m "Запись эфира завершена в 01:00" || exit 0
        git push
