yamlname: Record Radio Petersburg

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install FFmpeg
      run: sudo apt-get update && sudo apt-get install -y ffmpeg

    - name: Record 1 hour stream
      run: |
        FILENAME="Radio_Peterburg_$(date +'%d-%m-%Y').mp3"
        ffmpeg -i "https://5-tv.ru" -t 3600 -acodec copy "$FILENAME"

    - name: Save MP3 to Repository
      run: |
        git config --global user.name "RadioBot"
        git config --global user.email "bot@github.com"
        git add *.mp3
        git commit -m "Add radio archive" || exit 0
        git push
