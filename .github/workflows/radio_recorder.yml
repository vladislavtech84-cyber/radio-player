name: Автоматическая запись Радио

on:
  schedule:
    # Робот будет сам включаться каждый день в 17:00 по московскому времени
    - cron: '0 14 * * *'
  workflow_dispatch: # Кнопка для запуска записи вручную в любое время

permissions:
  contents: write

jobs:
  record_radio:
    runs-on: ubuntu-latest
    steps:
    - name: Скачиваем файлы репозитория
      uses: actions/checkout@v4

    - name: Запись 4 часов эфира Радио Петербург
      run: |
        ffmpeg -y -i "https://cdnvideo.ru" -t 14400 -c copy spb_archive.mp3

    - name: Сохраняем записанный аудиофайл на сайт
      run: |
        git config --global user.name "GitHub Action Робот"
        git config --global user.email "action@github.com"
        git add spb_archive.mp3
        git commit -m "Автоматическое обновление архива радио"
        git push
