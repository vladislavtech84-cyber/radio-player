name: RadioRecord

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Record
      run: |
        sudo apt-get update && sudo apt-get install -y ffmpeg
        FILENAME="Radio_$(date +'%d-%m-%Y').mp3"
        ffmpeg -i "https://5-tv.ru" -t 3600 -acodec copy "$FILENAME"

    - name: Save
      run: |
        git config --global user.name "RadioBot"
        git config --global user.email "bot@github.com"
        git add *.mp3
        git commit -m "Save radio" || exit 0
        git push
