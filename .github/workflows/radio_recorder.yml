name: Hourly Radio Recorder

on:
  schedule:
    # Запуск 5 раз в день по МСК: в 08:00, 11:00, 14:00, 17:00, 20:00
    - cron: '0 5 * * *'
    - cron: '0 8 * * *'
    - cron: '0 11 * * *'
    - cron: '0 14 * * *'
    - cron: '0 17 * * *'
  workflow_dispatch: # Кнопка для ручного теста

jobs:
  record-hour:
    runs-on: ubuntu-latest
    
    steps:
    - name: Install Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg rclone

    - name: Record and Upload Audio
      env:
        RCLONE_CONFIG_GDRIVE_TYPE: drive
        RCLONE_CONFIG_GDRIVE_SCOPE: drive
        RCLONE_CONFIG_GDRIVE_TOKEN: ${{ secrets.GDRIVE_TOKEN }}
      run: |
        export TZ="Europe/Moscow"
        CURRENT_HOUR=$(date +%H)
        
        # Определяем номер программы по времени её старта
        if [ "$CURRENT_HOUR" -eq "08" ] || [ "$CURRENT_HOUR" -eq "09" ]; then PROG_NUM=1;
        elif [ "$CURRENT_HOUR" -eq "11" ] || [ "$CURRENT_HOUR" -eq "12" ]; then PROG_NUM=2;
        elif [ "$CURRENT_HOUR" -eq "14" ] || [ "$CURRENT_HOUR" -eq "15" ] ; then PROG_NUM=3;
        elif [ "$CURRENT_HOUR" -eq "17" ] || [ "$CURRENT_HOUR" -eq "18" ]; then PROG_NUM=4;
        else PROG_NUM=5; fi
        
        FILE_NAME="program_${PROG_NUM}.mp3"
        
        echo "Запуск записи 1 часа радио для программы №${PROG_NUM}..."
        
        # Записываем поток Радио Ваня (проверим на 30 секундах для быстрого теста, затем вернем 3600)
        ffmpeg -reconnect 1 -reconnect_at_eof 1 -reconnect_streamed 1 -reconnect_delay_max 5 \
               -i "https://radiokrug.ru" \
               -t 30 -acodec libmp3lame -b:a 128k "$FILE_NAME" -y || true
        
        echo "Запись завершена. Отправка напрямую в Google Диск..."
        
        # Загружаем файл напрямую в корень вашего Google Диска с перезаписью старого
        rclone copy "$FILE_NAME" gdrive: --progress
