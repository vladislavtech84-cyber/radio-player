name: "Радио Часть 1 (Ручной запуск - 5 часов)"

on:
  workflow_dispatch: # Запуск только вручную вами по кнопке

jobs:
  record_part_1:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write

    steps:
      - name: Проверка репозитория
        uses: actions/checkout@v4

      - name: Установка FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Запись потока (5 часов)
        # -t 18000 — это ровно 5 часов (5 * 60 * 60)
        # -segment_time 1800 — нарезка на файлы по 30 минут
        run: |
          ffmpeg -reconnect 1 -reconnect_at_eof 1 -reconnect_streamed 1 -reconnect_delay_max 5 \
          -i "https://radio.5-tv.ru/radio.mp3" \
          -t 18000 \
          -c copy \
          -f segment \
          -segment_time 1800 \
          -strftime 1 "radio_%Y%m%d_%H%M%S.mp3"
          
      - name: Сохранение аудиофайлов в репозиторий
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull origin main --rebase
          git add radio_*.mp3
          git diff-index --quiet HEAD || git commit -m "Архив радио. Часть 1 (5 часов) сохранена"
          git push origin main

      - name: Автозапуск Части 2
        # Убедитесь, что файл второй части называется именно так (например, part2.yml)
        run: |
          gh workflow run part2.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
