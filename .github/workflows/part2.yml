name: Радио Часть 2 (Автостарт - 5 часов)

on:
  workflow_dispatch: # Позволяет первой части вызвать этот скрипт

jobs:
  record_part_1:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write

    steps:
      - name: Проверка репозитория
        uses: actions/checkout@v4

      - name: Установка FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Запись потока (5 часов)
        run: |
          ffmpeg -i "https://radio.5-tv.ru/radio.mp3" -t 18000 -c copy -f segment -segment_time 1800 -strftime 1 "radio_%Y%m%d_%H%M%S.mp3"

      - name: Сохранение аудиофайлов в репозиторий
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add radio_*.mp3
          git diff-index --quiet HEAD || git commit -m "Архив радио. Часть 2 (5 часов) сохранена"
          git push

      - name: Автозапуск Части 3
        run: |
          gh workflow run part3.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
