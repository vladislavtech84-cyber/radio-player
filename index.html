<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Радио Петербург — Пятый Канал</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .player-container {
            background-color: #1e1e1e;
            padding: 35px 30px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 320px;
        }
        h2 {
            font-size: 22px;
            margin-bottom: 5px;
            color: #00ff87;
            margin-top: 0;
        }
        .status {
            font-size: 13px;
            color: #888888;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .play-btn {
            background-color: #00ff87;
            color: #121212;
            border: none;
            padding: 16px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            outline: none;
            box-shadow: 0 4px 15px rgba(0, 255, 135, 0.3);
        }
        .play-btn:hover {
            transform: scale(1.02);
            background-color: #00e175;
        }
        .playing {
            background-color: #ff3b30;
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(255, 59, 48, 0.3);
        }
    </style>
</head>
<body>

<div class="player-container">
    <h2>Радио Петербург</h2>
    <div class="status" id="status-text">ТРК Пятый Канал • LIVE</div>
    
    <!-- Главная кнопка управления -->
    <button class="play-btn" id="play-trigger" onclick="toggleRadio()">ВКЛЮЧИТЬ РАДИО</button>
    
    <!-- Официальный прямой аудиопоток с серверов 5-tv.ru -->
    <audio id="radio-player" src="https://5-tv.ru" preload="none" crossorigin="anonymous"></audio>
</div>

<script>
    const audio = document.getElementById('radio-player');
    const button = document.getElementById('play-trigger');
    const statusText = document.getElementById('status-text');

    function toggleRadio() {
        if (audio.paused) {
            // Перезапускаем поток с официального сайта, чтобы не было задержки
            audio.src = 'https://5-tv.ru';
            audio.play()
                .then(() => {
                    button.textContent = 'ВЫКЛЮЧИТЬ';
                    button.classList.add('playing');
                    statusText.textContent = '🔊 В ЭФИРЕ...';
                })
                .catch(error => {
                    alert('Ошибка сети. Нажмите кнопку еще раз через пару секунд.');
                    console.error(error);
                });
        } else {
            audio.pause();
            audio.src = ''; // Сброс буфера
            button.textContent = 'ВКЛЮЧИТЬ РАДИО';
            button.classList.remove('playing');
            statusText.textContent = 'ТРК Пятый Канал • LIVE';
        }
    }
</script>

</body>
</html>
