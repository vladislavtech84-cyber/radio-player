<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Тест 8 циклов радио</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background: #f4f4f9; }
        .container { max-width: 450px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 6px; }
        #status { margin-top: 25px; font-weight: bold; color: #333; background: #e9ecef; padding: 10px; border-radius: 6px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Тестирование: 8 циклов по 1 минуте</h2>
    <audio id="radioPlayer" controls crossorigin="anonymous" style="width:100%;"></audio>
    <br><br>
    <button id="playBtn">Включить Эфир</button>
    <div id="status">Статус: Плеер остановлен</div>
</div>

<script>
const STREAM_URL = "https://radio.5-tv.ru/radio.mp3"; 
const player = document.getElementById('radioPlayer');
const playBtn = document.getElementById('playBtn');
const statusDiv = document.getElementById('status');

let checkInterval;
let activeCycle = 0;

playBtn.addEventListener('click', () => {
    if (player.paused) {
        startLive();
        playBtn.innerText = "Остановить";
        startTimelineChecking();
    } else {
        player.pause();
        playBtn.innerText = "Включить Эфир";
        statusDiv.innerText = "Статус: Плеер остановлен";
        clearInterval(checkInterval);
    }
});

function startLive() {
    player.src = STREAM_URL;
    player.play().catch(e => console.log("Нажмите играть"));
    statusDiv.innerText = "Статус: В эфире прямой трансляции";
}

function startTimelineChecking() {
    clearInterval(checkInterval);
    checkInterval = setInterval(() => {
        const now = new Date();
        const h = now.getHours();
        const m = now.getMinutes();
        const s = now.getSeconds();

        // Проверяем временной промежуток с 16:55 до 17:03 (8 минут)
        if (h === 16 && m >= 55 && m < 17) {
            let currentMinuteOfTest = m - 55; // 0, 1, 2...7
            let cycleNumber = currentMinuteOfTest + 1;

            if (activeCycle !== cycleNumber) {
                activeCycle = cycleNumber;
                triggerCycleInterruption(cycleNumber);
            }
        }
    }, 1000);
}

// Прерывание эфира внутри браузера для имитации проигрывания записи
function triggerCycleInterruption(cycleNum) {
    statusDiv.innerText = `Статус: Цикл ${cycleNum}. Эфир отключен. Имитация проигрывания записи (1 мин)...`;
    
    // Останавливаем поток радио
    player.pause(); 
    
    // Ровно через 1 минуту (60000 мс) возвращаем радио на автомате
    setTimeout(() => {
        statusDiv.innerText = `Статус: Цикл ${cycleNum} завершен. Возврат к прямому эфиру...`;
        startLive();
    }, 60000);
}
</script>
</body>
</html>
