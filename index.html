<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Тест 21:45 Радио</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background: #1a1a2e; color: #fff; }
        .container { max-width: 500px; margin: 0 auto; background: #161625; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); border: 1px solid #007bff; }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 6px; font-weight: bold; }
        #status { margin-top: 25px; font-size: 15px; font-weight: bold; padding: 15px; background: #6c757d; border-radius: 6px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Тест: Радио Петербург (Старт в 21:45)</h2>
    <audio id="mainPlayer" controls style="width: 100%; margin-top: 15px;"></audio>
    <br><br>
    <button id="playBtn">Включить Радио</button>
    <div id="status">Статус: Остановлено</div>
</div>

<script>
const LIVE_STREAM = "https://radio.5-tv.ru/radio.mp3"; 
const player = document.getElementById('mainPlayer');
const playBtn = document.getElementById('playBtn');
const statusDiv = document.getElementById('status');

let checkInterval;
let isArchivePlaying = false;
let forceReturnedToLive = false;

playBtn.addEventListener('click', () => {
    if (player.paused) {
        forceReturnedToLive = false;
        startLiveRadio();
        playBtn.innerText = "Остановить";
        playBtn.style.background = "#dc3545";
        startTimelineChecking();
    } else {
        stopEverything();
    }
});

function startLiveRadio() {
    isArchivePlaying = false;
    player.removeAttribute('src'); 
    player.load();
    player.src = LIVE_STREAM;
    player.play().catch(e => console.log("Нажмите играть"));
    statusDiv.innerText = "РЕЖИМ: Живой прямой эфир";
    statusDiv.style.background = "#28a745";
    statusDiv.style.color = "#fff";
}

function stopEverything() {
    player.pause();
    player.src = "";
    playBtn.innerText = "Включить Radio";
    playBtn.style.background = "#28a745";
    statusDiv.innerText = "Статус: Остановлено";
    statusDiv.style.background = "#6c757d";
    clearInterval(checkInterval);
}

function startTimelineChecking() {
    clearInterval(checkInterval);
    checkInterval = setInterval(() => {
        const now = new Date();
        const h = now.getHours();
        const m = now.getMinutes();

        // С 21:45 до 21:54 показываем статус записи в облаке
        if (h === 21 && m >= 45 && m < 55 && !isArchivePlaying) {
            statusDiv.innerText = "РЕЖИМ: Прямой эфир + [В облаке GitHub началась запись...]";
            statusDiv.style.background = "#007bff";
        }

        // Начиная с 21:55 ждем готовности файла и включаем его
        if (h === 21 && m >= 55 && !isArchivePlaying && !forceReturnedToLive) {
            checkAndPlayArchive();
        }

        // ЖЕСТКИЙ ТАЙМЕР ВОЗВРАТА: Ровно в 22:07 принудительно возвращаем эфир радио по часам
        if (((h === 22 && m >= 7) || h > 22) && !forceReturnedToLive) {
            forceReturnedToLive = true;
            startLiveRadio();
        }
    }, 1000);
}

async function checkAndPlayArchive() {
    // Каждую секунду обманываем кэш CDN с помощью временной метки, ища свежий файл part_1.mp3
    const fileUrl = `part_1.mp3?v=${new Date().getTime()}`;
    statusDiv.innerText = "РЕЖИМ: Ожидание публикации файла part_1.mp3 от GitHub...";
    statusDiv.style.background = "#ffc107";
    statusDiv.style.color = "#000";

    try {
        const response = await fetch(fileUrl, { method: 'HEAD' });
        if (response.ok) {
            isArchivePlaying = true;
            statusDiv.innerText = "РЕЖИМ: Запись найдена! Воспроизведение архива (10 мин)";
            statusDiv.style.background = "#6f42c1";
            statusDiv.style.color = "#fff";
            
            player.removeAttribute('src');
            player.load();
            player.src = fileUrl;
            player.play();
        }
    } catch (e) {
        console.log("Ожидание файла...");
    }
}
</script>
</body>
</html>
