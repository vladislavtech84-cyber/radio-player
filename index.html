<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Радио Петербург — Архив</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .player-container {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
            width: 360px;
        }
        h2 { margin-bottom: 15px; font-size: 20px; color: #00ff88; }
        .mode-selector {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            background: #2a2a2a;
            border-radius: 20px;
            padding: 3px;
        }
        .mode-btn {
            background: transparent;
            border: none;
            color: #aaa;
            padding: 8px 15px;
            font-size: 13px;
            border-radius: 17px;
            cursor: pointer;
            flex: 1;
            transition: 0.2s;
        }
        .mode-btn.active {
            background: #00ff88;
            color: #121212;
            font-weight: bold;
        }
        .main-btn {
            background: #00ff88;
            color: #121212;
            border: none;
            padding: 15px 40px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
        }
        .main-btn:hover { transform: scale(1.02); background: #00dd77; }
        .time-display { margin: 20px 0 10px; font-size: 14px; color: #aaa; }
        .progress-container {
            background: #333;
            border-radius: 5px;
            cursor: pointer;
            height: 8px;
            width: 100%;
        }
        .progress-bar {
            background: #00ff88;
            border-radius: 5px;
            height: 100%;
            width: 0%;
        }
    </style>
</head>
<body>

    <div class="player-container">
        <h2 id="statusTitle">Радио Петербург</h2>
        <audio id="audioTrack"></audio>

        <div class="mode-selector">
            <button id="modeLive" class="mode-btn active">Прямой эфир</button>
            <button id="modeArchive" class="mode-btn">Запись эфира</button>
        </div>

        <div class="controls">
            <button id="playBtn" class="main-btn">▶ ИГРАТЬ</button>
        </div>

        <div class="time-display">
            <span id="currentTime">00:00:00</span> / <span id="durationTime">00:00:00</span>
        </div>

        <div class="progress-container" id="progressContainer">
            <div class="progress-bar" id="progressBar"></div>
        </div>
    </div>

    <script>
        // Поток радио и локальный файл архива, который будет создавать сам GitHub
        const LIVE_STREAM_URL = "https://cdnvideo.ru"; 
        const ARCHIVE_FILE_URL = "spb_archive.mp3"; 

        const audio = document.getElementById('audioTrack');
        const playBtn = document.getElementById('playBtn');
        const progressBar = document.getElementById('progressBar');
        const progressContainer = document.getElementById('progressContainer');
        const currentTimeEl = document.getElementById('currentTime');
        const durationTimeEl = document.getElementById('durationTime');
        const statusTitle = document.getElementById('statusTitle');
        const modeLiveBtn = document.getElementById('modeLive');
        const modeArchiveBtn = document.getElementById('modeArchive');

        let isLive = true; 
        let userControlled = false;

        function checkTimeAutoswitch() {
            if (userControlled) return;
            const currentHour = new Date().getHours();
            // С 1:00 ночи до 6:00 утра автоматически включает архив
            const shouldBeArchive = (currentHour >= 1 && currentHour < 6);
            if (shouldBeArchive && isLive) {
                switchMode(false);
            } else if (!shouldBeArchive && !isLive) {
                switchMode(true);
            }
        }

        function switchMode(wantLive) {
            isLive = wantLive;
            const wasPlaying = !audio.paused;

            if (isLive) {
                modeLiveBtn.classList.add('active');
                modeArchiveBtn.classList.remove('active');
                statusTitle.textContent = "Радио Петербург (LIVE)";
            } else {
                modeLiveBtn.classList.remove('active');
                modeArchiveBtn.classList.add('active');
                statusTitle.textContent = "Играет Архив Эфира";
            }

            audio.src = isLive ? LIVE_STREAM_URL : ARCHIVE_FILE_URL;
            audio.load();

            if (wasPlaying) {
                audio.play().catch(err => console.log(err));
                playBtn.textContent = '⏸ ПАУЗА';
            } else {
                playBtn.textContent = '▶ ИГРАТЬ';
            }
        }

        modeLiveBtn.addEventListener('click', () => { userControlled = true; if (!isLive) switchMode(true); });
        modeArchiveBtn.addEventListener('click', () => { userControlled = true; if (isLive) switchMode(false); });

        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play().catch(err => alert("Эфир сейчас не идет или архив еще не записан роботом. Попробуйте переключить режим сверху."));
                playBtn.textContent = '⏸ ПАУЗА';
            } else {
                audio.pause();
                playBtn.textContent = '▶ ИГРАТЬ';
            }
        });

        checkTimeAutoswitch();
        setInterval(checkTimeAutoswitch, 60000);

        function formatTime(seconds) {
            if (isNaN(seconds) || seconds === Infinity) return "00:00:00";
            const hrs = Math.floor(seconds / 3600);
            const mins = Math.floor((seconds % 3600) / 60);
            const secs = Math.floor(seconds % 60);
            return `${hrs.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        audio.addEventListener('timeupdate', () => {
            currentTimeEl.textContent = formatTime(audio.currentTime);
            if (audio.duration && audio.duration !== Infinity) {
                progressBar.style.width = `${(audio.currentTime / audio.duration) * 100}%`;
            } else {
                progressBar.style.width = "100%";
            }
        });

        audio.addEventListener('loadedmetadata', () => {
            durationTimeEl.textContent = (audio.duration === Infinity) ? "LIVE" : formatTime(audio.duration);
        });

        progressContainer.addEventListener('click', (e) => {
            if (!isLive && audio.duration) {
                audio.currentTime = (e.offsetX / progressContainer.clientWidth) * audio.duration;
            }
        });

        audio.addEventListener('error', () => { if (isLive && !userControlled) switchMode(false); });
    </script>
</body>
</html>
