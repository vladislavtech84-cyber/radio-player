<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Радио Петербург — Архив</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="player-container">
        <h2 id="statusTitle">Радио Петербург</h2>
        
        <!-- Скрытый аудио-тег -->
        <audio id="audioTrack"></audio>

        <!-- Кнопки переключения режимов (Радио или Архив) -->
        <div class="mode-selector">
            <button id="modeLive" class="mode-btn active">Прямой эфир</button>
            <button id="modeArchive" class="mode-btn">Запись эфира</button>
        </div>

        <!-- Главная кнопка запуск/пауза -->
        <div class="controls">
            <button id="playBtn" class="main-btn">▶ ИГРАТЬ</button>
        </div>

        <!-- Таймер времени -->
        <div class="time-display">
            <span id="currentTime">00:00:00</span> / <span id="durationTime">00:00:00</span>
        </div>

        <!-- Полоса перемотки -->
        <div class="progress-container" id="progressContainer">
            <div class="progress-bar" id="progressBar"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
