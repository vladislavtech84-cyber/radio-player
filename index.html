<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Радио Плеер — С записью</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0b1325;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .radio-container {
            text-align: center;
            background: #1e293b;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 350px;
        }
        h1 {
            font-size: 22px;
            color: #38bdf8;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .subtitle {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 25px;
        }
        audio {
            width: 100%;
            margin-bottom: 20px;
        }
        .record-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            background-color: #ef4444;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .record-btn:hover {
            background-color: #dc2626;
            transform: scale(1.02);
        }
        .record-btn.recording {
            background-color: #10b981;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="radio-container">
        <h1>Радио Плеер</h1>
        <div class="subtitle">Прямой эфир вещания</div>
        
        <!-- Полностью исправленный аудиоплеер с открытым аудиопотоком -->
        <audio id="radio" controls crossorigin="anonymous">
            <source src="https://radio.5-tv.ru/radio.mp3" type="audio/aac">
            Ваш browser не поддерживает элемент audio.
        </audio>

        <button id="record-btn" class="record-btn">
            <span id="dot">🔴</span> <span id="text">Записать эфир</span>
        </button>
    </div>

    <!-- Подключаем логику записи из нашей правильной папки js -->
    <script src="js/script.js"></script>

</body>
</html>
