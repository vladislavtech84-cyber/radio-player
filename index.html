<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Бесшовный Таймер Радио</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background: #f4f4f9; color: #333; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 6px; font-weight: bold; }
        #status { margin-top: 25px; font-size: 16px; font-weight: bold; color: #fff; padding: 15px; background: #28a745; border-radius: 6px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Автоматическое переключение: Эфир / Запись</h2>
    <audio id="mainPlayer" controls style="width: 100%; margin-top: 15px;"></audio>
    <br><br>
    <button id="playBtn">Запустить Эфир</button>
    <div id="status">Статус: Остановлено. Нажмите кнопку.</div>
</div>

<script>
const STREAM_URL = "https://radio.5-tv.ru/radio.mp3"; 
// Ссылка на ваш тестовый файл в репозитории GitHub
const RECORD_URL = "test_1.mp3"; 

const player = document.getElementById('mainPlayer');
const playBtn = document.getElementById('playBtn');
const statusDiv = document.getElementById('status');

let checkInterval;
let isRadioMode = true;

playBtn.addEventListener('click', () => {
    if (player.paused) {
        startLiveRadio();
        playBtn.innerText = "Остановить";
        playBtn.style.background = "#dc3545";
        startTimelineChecking();
    } else {
        player.pause();
        playBtn.innerText = "Запустить Эфир";
        playBtn.style.background = "#28a745";
        statusDiv.innerText = "Статус: Остановлено";
        statusDiv.style.background = "#6c757d";
        clearInterval(checkInterval);
    }
});

function startLiveRadio() {
    isRadioMode = true;
    player.src = STREAM_URL;
    player.play().catch(e => console.log("Кликните для активации звука"));
    statusDiv.innerText = "РЕЖИМ: Живой прямой эфир";
    statusDiv.style.background = "#28a745";
}

function playRecordedFile() {
    isRadioMode = false;
    statusDiv.innerText = "РЕЖИМ: Воспроизведение записи (test_1.mp3)";
    statusDiv.style.background = "#ffc107";
    statusDiv.style.color = "#000";
    
    player.src = RECORD_URL;
    player.play().catch(e => console.log("Ошибка воспроизведения файла"));
}

function startTimelineChecking() {
    clearInterval(checkInterval);
    checkInterval = setInterval(() => {
        const now = new Date();
        const h = now.getHours();
        const m = now.getMinutes();
        const s = now.getSeconds();

        // ЦИКЛ 1: В 17:05:00 включаем ЗАПИСЬ
        if (h === 17 && m === 5 && s === 0 && isRadioMode) {
            playRecordedFile();
        }
        
        // В 17:06:00 возвращаем ЭФИР
        if (h === 17 && m === 6 && s === 0 && !isRadioMode) {
            playRecordedFile(); // Перезапуск или возврат к радио
            startLiveRadio();
        }

        // ЦИКЛ 2: В 17:07:00 включаем ЗАПИСЬ
        if (h === 17 && m === 7 && s === 0 && isRadioMode) {
            playRecordedFile();
        }
        
        // В 17:08:00 возвращаем ЭФИР
        if (h === 17 && m === 8 && s === 0 && !isRadioMode) {
            startLiveRadio();
        }
    }, 1000);
}
</script>
</body>
</html>
