<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Радио Петербург с Таймером</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background: #f4f4f9; }
        .container { max-width: 400px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
        #status { margin-top: 20px; font-weight: bold; color: #555; }
    </style>
</head>
<body>

<div class="container">
    <h2>Радио Петербург (5 канал)</h2>
    <!-- Основной аудиоплеер -->
    <audio id="radioPlayer" controls crossorigin="anonymous"></audio>
    <br><br>
    <button id="playBtn">Включить Радио</button>
    <div id="status">Статус: Плеер остановлен</div>
</div>

<script>
// Ссылка на официальный поток Радио Петербург
const STREAM_URL = "https://radio.5-tv.ru/radio.mp3"; 

const player = document.getElementById('radioPlayer');
const playBtn = document.getElementById('playBtn');
const statusDiv = document.getElementById('status');

let mediaRecorder;
let recordedChunks = [];
let recordTimeout;
let checkTimerInterval;
let recordedAudioURL = null;

// Инициализация радио при клике (требование браузеров для автоплея)
playBtn.addEventListener('click', () => {
    if (player.paused) {
        startLiveRadio();
        playBtn.innerText = "Остановить Радио";
        startTimerChecking(); // Запускаем ежесекундную проверку времени
    } else {
        player.pause();
        playBtn.innerText = "Включить Радио";
        statusDiv.innerText = "Статус: Плеер остановлен";
        clearInterval(checkTimerInterval);
    }
});

// Функция включения прямого эфира
function startLiveRadio() {
    player.src = STREAM_URL;
    player.play().catch(e => console.log("Ошибка автоплея: ", e));
    statusDiv.innerText = "Статус: В эфире прямой трансляции";
}

// Проверка времени каждую секунду
function startTimerChecking() {
    clearInterval(checkTimerInterval);
    checkTimerInterval = setInterval(() => {
        const now = new Date();
        const hours = now.getHours();
        const minutes = now.getMinutes();

        // Проверяем наступление 16:25
        if (hours === 16 && minutes === 25 && (!mediaRecorder || mediaRecorder.state === "inactive")) {
            startBackgroundRecording();
        }
    }, 1000);
}

// Фоновая запись потока БЕЗ прерывания текущего прослушивания
function startBackgroundRecording() {
    statusDiv.innerText = "Статус: Прямой эфир + Идет фоновая запись...";
    recordedChunks = [];

    // Создаем отдельный аудио-объект в памяти для захвата данных потока
    const recordAudioContext = new (window.AudioContext || window.webkitAudioContext)();
    const dest = recordAudioContext.createMediaStreamDestination();
    
    const hiddenAudio = new Audio(STREAM_URL);
    hiddenAudio.crossOrigin = "anonymous";
    
    const source = recordAudioContext.createMediaElementSource(hiddenAudio);
    source.connect(dest);
    
    // Запускаем скрытый поток для записи
    hiddenAudio.play();

    // Настраиваем запись
    mediaRecorder = new MediaRecorder(dest.stream);
    
    mediaRecorder.ondataavailable = (event) => {
        if (event.data.size > 0) recordedChunks.push(event.data);
    };

    mediaRecorder.onstop = () => {
        // Создаем аудиофайл из записанных кусочков
        const audioBlob = new Blob(recordedChunks, { type: 'audio/mp3' });
        recordedAudioURL = URL.createObjectURL(audioBlob);
        
        // Останавливаем скрытое аудио
        hiddenAudio.pause();
        hiddenAudio.src = "";

        // Шаг 2: Включаем запись, выключаем радио
        playRecordedAudio();
    };

    // Запускаем запись
    mediaRecorder.start();

    // Ровно через 5 минут (300 000 мс) останавливаем запись
    recordTimeout = setTimeout(() => {
        if (mediaRecorder && mediaRecorder.state !== "inactive") {
            mediaRecorder.stop();
        }
    }, 5 * 60 * 1000); 
}

// Воспроизведение только что записанного фрагмента
function playRecordedAudio() {
    statusDiv.innerText = "Статус: Радио выключено. Играет записанный фрагмент (5 мин)";
    
    player.src = recordedAudioURL;
    player.play();

    // Событие: как только запись полностью проиграется
    player.onended = () => {
        statusDiv.innerText = "Статус: Запись проиграна. Возврат к прямому эфиру...";
        player.onended = null; // Сбрасываем триггер окончания
        
        // Шаг 3: Снова включаем радио на автомате
        startLiveRadio();
    };
}
</script>

</body>
</html>
