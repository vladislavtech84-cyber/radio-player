<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Радио Петербург</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .player-container {
            background-color: #1e1e1e;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 320px;
        }
        h2 {
            font-size: 24px;
            margin-bottom: 5px;
            color: #00ff87;
            margin-top: 0;
        }
        .status {
            font-size: 14px;
            color: #888888;
            margin-bottom: 35px;
        }
        /* Кнопка запуска официального вещания 5-tv.ru */
        .btn-link {
            display: inline-block;
            background-color: #00ff87;
            color: #121212;
            text-decoration: none;
            padding: 16px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            width: 100%;
            box-sizing: border-box;
            box-shadow: 0 4px 15px rgba(0, 255, 135, 0.3);
            transition: transform 0.2s;
        }
        .btn-link:hover {
            transform: scale(1.02);
            background-color: #00e175;
        }
        .archive-btn {
            background-color: #2b2b2b;
            color: #ffffff;
            border: 1px solid #444;
            margin-top: 20px;
            font-size: 14px;
            padding: 12px 20px;
            border-radius: 8px;
        }
        .archive-btn:hover {
            border-color: #00ff87;
            background-color: #3d3d3d;
        }
    </style>
</head>
<body>

<div class="player-container">
    <h2>Радио Петербург</h2>
    <div class="status">🔴 ПРЯМОЙ ЭФИР • 5-TV</div>
    
    <!-- Официальный поток Пятого канала откроется сразу в медиа-плеере браузера -->
    <a href="https://radio.5-tv.ru/radio.mp3" target="_blank" class="btn-link">▶ ВКЛЮЧИТЬ РАДИО</a>

    <!-- Ссылка на ваш архив на GitHub -->
    <a href="https://github.com" target="_blank" class="btn-link archive-btn">📁 Открыть архив записей</a>
</div>

</body>
</html>
