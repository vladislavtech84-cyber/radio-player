<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Радио Петербург — Автоматика</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background: #1a1a2e; color: #fff; }
        .container { max-width: 500px; margin: 0 auto; background: #161625; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); border: 1px solid #007bff; }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 6px; font-weight: bold; }
        #status { margin-top: 25px; font-size: 15px; font-weight: bold; padding: 15px; background: #6c757d; border-radius: 6px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Радио Петербург (Умный Поиск Записи)</h2>
    <audio id="mainPlayer" controls style="width: 100%; margin-top: 15px;"></audio>
    <br><br>
    <button id="playBtn">Включить Радио</button>
    <div id="status">Статус: Остановлено</div>
</div>

<script>
const LIVE_STREAM = "https://radio.5-tv.ru/radio.mp3"; 
// Автоматически определяем имя пользователя и репозиторий из ссылки сайта
const RepoURL = window.location.pathname.split('/')[1];
const UserURL = window.location.hostname.split('.')[0];

const player = document.getElementById('mainPlayer');
const playBtn = document.getElementById('playBtn');
const statusDiv = document.getElementById('status');

let checkInterval;
let isArchivePlaying = false;

playBtn.addEventListener('click', () => {
    if (player.paused) {
        startLiveRadio();
        playBtn.innerText = "Остановить";
        playBtn.style.background = "#dc3545";
        startTimelineChecking();
    } else {
        stopEverything();
    }
});

function startLiveRadio() {
    isArchivePlaying = false;
    player.removeAttribute('src'); 
    player.load();
    player.src = LIVE_STREAM;
    player.play().catch(e => console.log("Нажмите играть"));
    statusDiv.innerText = "РЕЖИМ: Живой прямой эфир";
    statusDiv.style.background = "#28a745";
    statusDiv.style.color = "#fff";
}

function stopEverything() {
    player.pause();
    player.src = "";
    playBtn.innerText = "Включить Радио";
    playBtn.style.background = "#28a745";
    statusDiv.innerText = "Статус: Остановлено";
    statusDiv.style.background = "#6c757d";
    clearInterval(checkInterval);
}

function startTimelineChecking() {
    clearInterval(checkInterval);
    checkInterval = setInterval(() => {
        const now = new Date();
        const h = now.getHours();
        const m = now.getMinutes();

        // Время проверки: если наступило время после записи, ищем самый свежий mp3 файл в репозитории
        if ((h === 19 && m >= 30) || h > 19) {
            if (!isArchivePlaying) {
                findAndPlayLatestArchive();
            }
        } else {
            // В остальное время просто информируем
            if (h === 19 && m < 30) {
                statusDiv.innerText = "РЕЖИМ: Прямой эфир. Ожидание завершения записи в облаке...";
                statusDiv.style.background = "#007bff";
            }
        }
    }, 5000); // Проверяем раз в 5 секунд, чтобы не спамить сервер
}

// Умная функция: обращается к GitHub API, находит самый новый файл part_*.mp3 и включает его
async function findAndPlayLatestArchive() {
    statusDiv.innerText = "РЕЖИМ: Сканирование репозитория в поиске свежей записи...";
    statusDiv.style.background = "#ffc107";
    statusDiv.style.color = "#000";

    try {
        // Запрашиваем список файлов напрямую у GitHub API
        const response = await fetch(`https://github.com{UserURL}/${RepoURL}/contents/`);
        if (!response.ok) return;
        
        const files = await response.json();
        // Фильтруем только наши файлы записей part_*.mp3
        const mp3Files = files.filter(f => f.name.startsWith('part_') && f.name.endsWith('.mp3'));
        
        if (mp3Files.length > 0) {
            // Сортируем и берем самый последний созданный файл
            mp3Files.sort((a, b) => b.name.localeCompare(a.name));
            const latestFile = mp3Files[0].name;

            isArchivePlaying = true;
            statusDiv.innerText = `РЕЖИМ: Воспроизведение найденной записи (${latestFile})`;
            statusDiv.style.background = "#6f42c1";
            statusDiv.style.color = "#fff";
            
            player.removeAttribute('src');
            player.load();
            // Запускаем этот файл
            player.src = `${latestFile}?v=${new Date().getTime()}`;
            player.play();

            // По окончании записи (через 10 минут) — автоматический возврат на радио
            player.onended = () => {
                player.onended = null;
                startLiveRadio();
            };
        }
    } catch (e) {
        console.log("Ошибка поиска файла в репозитории");
    }
}
</script>
</body>
</html>
