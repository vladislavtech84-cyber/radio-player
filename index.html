<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Радиоплеер: День и Ночь</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #111; color: #fff; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 500px; width: 100%; background: #222; padding: 30px; border-radius: 16px; box-shadow: 0 8px 25px rgba(0,0,0,0.7); text-align: center; margin-top: 40px; }
        .status-badge { display: inline-block; padding: 6px 16px; border-radius: 20px; font-size: 14px; font-weight: bold; margin-bottom: 20px; }
        .day-mode { background: #00ff99; color: #000; }
        .night-mode { background: #00bcff; color: #fff; }
        audio { width: 100%; margin-top: 15px; border-radius: 8px; }
        .track-info { margin-top: 15px; font-size: 16px; color: #bbb; font-weight: 500; }
    </style>
</head>
<body>

<div class="container">
    <div id="mode-badge" class="status-badge day-mode">☀️ ДНЕВНОЙ ЭФИР</div>
    <h1 id="main-title">Прямой эфир радио</h1>
    
    <!-- Главный плеер, куда всегда вшита ваша ссылка -->
    <audio id="global-player" controls autoplay src="https://radio.5-tv.ru/radio.mp3"></audio>
    
    <div id="current-track-name" class="track-info">Загрузка эфира...</div>
</div>

<script>
    const player = document.getElementById('global-player');
    const badge = document.getElementById('mode-badge');
    const title = document.getElementById('main-title');
    const trackName = document.getElementById('current-track-name');

    // Ваша неизменяемая ссылка на радиопоток
    const LIVE_STREAM = "https://radio.5-tv.ru/radio.mp3";
    let nightPlaylist = [];
    let currentTrackIndex = 0;

    // Функция автоматически считывает репозиторий и находит ваши файлы mp3
    async function fetchNightPlaylist() {
        const url = "https://github.com" + new Date().getTime();
        try {
            const response = await fetch(url);
            if (!response.ok) return;
            const files = await response.json();
            
            // Отбираем файлы записей
            let mp3Files = files.filter(file => file.name.endsWith('.mp3') && file.name.startsWith('record_'));
            
            // Сортируем их хронологически, чтобы они шли друг за другом по времени
            mp3Files.sort((a, b) => a.name.localeCompare(b.name));
            
            // Оставляем последние 8 файлов, записанных за день
            if (mp3Files.length > 8) {
                mp3Files = mp3Files.slice(-8);
            }
            
            nightPlaylist = mp3Files.map(file => file.download_url);
        } catch (e) {
            console.error("Ошибка при получении списка файлов:", e);
        }
    }

    async function checkTimeAndPlay() {
        const now = new Date();
        const currentHour = now.getHours();

        // 🌙 НОЧНОЙ РЕЖИМ (с 00:00 ночи до 07:59 утра)
        if (currentHour >= 0 && currentHour < 8) {
            if (badge.innerText !== "🌙 НОЧНОЙ АРХИВ") {
                badge.innerText = "🌙 НОЧНОЙ АРХИВ";
                badge.className = "status-badge night-mode";
                title.innerText = "Ночной архив программ";
                
                await fetchNightPlaylist();
                
                if (nightPlaylist.length > 0) {
                    currentTrackIndex = 0;
                    playNightTrack(currentTrackIndex);
                } else {
                    trackName.innerText = "Записи еще обновляются сервером. Включен прямой эфир.";
                    if (player.src !== LIVE_STREAM) {
                        player.src = LIVE_STREAM;
                        player.load();
                    }
                }
            }
        } 
        // ☀️ ДНЕВНОЙ РЕЖИМ (с 08:00 утра до 23:59 вечера)
        else {
            if (badge.innerText !== "☀️ ДНЕВНОЙ ЭФИР" || player.src !== LIVE_STREAM) {
                badge.innerText = "☀️ ДНЕВНОЙ ЭФИР";
                badge.className = "status-badge day-mode";
                title.innerText = "Прямой эфир радио";
                trackName.innerText = "Вы слушаете трансляцию в реальном времени";
                
                player.src = LIVE_STREAM;
                player.load();
            }
        }
    }

    // Функция запуска трека из ночного архива
    function playNightTrack(index) {
        if (index < nightPlaylist.length) {
            trackName.innerText = `Играет запись программы №${index + 1} из ${nightPlaylist.length}`;
            player.src = nightPlaylist[index];
            player.load();
            player.play().catch(e => console.log("Кликните на плеер для воспроизведения"));
        } else {
            // Если все 8 часов закончились, а 8 утра еще не наступило, крутим список заново
            currentTrackIndex = 0;
            playNightTrack(0);
        }
    }

    // Когда очередной часовой файл доиграл до конца — автоматически включается следующий
    player.onended = function() {
        const now = new Date();
        const currentHour = now.getHours();

        if (currentHour >= 0 && currentHour < 8) {
            currentTrackIndex++;
            playNightTrack(currentTrackIndex);
        }
    };

    // Проверяем время каждые 2 минуты, чтобы точно поймать полночь или утро
    setInterval(checkTimeAndPlay, 120000);

    // Первое автоматическое включение при открытии страницы
    checkTimeAndPlay();
</script>

</body>
</html>
