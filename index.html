<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Радио Петербург — Ночной Ночной Автомат</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0b1325;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .radio-container {
            text-align: center;
            background: #1e293b;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 350px;
        }
        h1 {
            font-size: 22px;
            color: #38bdf8;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 25px;
            text-transform: uppercase;
        }
        .archive { background-color: #10b981; color: white; }
        .off { background-color: #64748b; color: white; }
        audio {
            width: 100%;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="radio-container">
        <h1>Радио Петербург</h1>
        <div id="status" class="status-badge">Проверка времени...</div>
        
        <audio id="radioPlayer" controls autoplay>
            <source id="audioSource" src="" type="audio/mpeg">
            Ваш браузер не поддерживает элемент audio.
        </audio>
    </div>

    <script>
        function checkTimeAndPlay() {
            const player = document.getElementById('radioPlayer');
            const source = document.getElementById('audioSource');
            const statusBadge = document.getElementById('status');
            
            const currentHour = new Date().getHours(); 
            let newSrc = "";

            // Правило: Ночной архив строго с 00:00 ночи до 07:59 утра
            if (currentHour >= 0 && currentHour < 8) {
                newSrc = "record.mp3";
                statusBadge.textContent = "💾 АРХИВ ЭФИРА (00:00 - 08:00)";
                statusBadge.className = "status-badge archive";
            } 
            // В любое другое время дня радио полностью выключено
            else {
                newSrc = "";
                statusBadge.textContent = "⚪ ЭФИР ВЫКЛЮЧЕН";
                statusBadge.className = "status-badge off";
            }

            if (source.getAttribute('src') !== newSrc) {
                source.setAttribute('src', newSrc);
                player.load();
                if (newSrc === "") {
                    player.pause();
                }
            }
        }

        checkTimeAndPlay();
        // Проверяем время каждую минуту для автоматического включения/выключения
        setInterval(checkTimeAndPlay, 60000);
    </script>

</body>
</html>
