<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Радио Петербург — Автоматика</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background: #1a1a2e; color: #fff; }
        .container { max-width: 500px; margin: 0 auto; background: #161625; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); border: 1px solid #007bff; }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 6px; font-weight: bold; }
        #status { margin-top: 25px; font-size: 15px; font-weight: bold; padding: 15px; background: #6c757d; border-radius: 6px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Радио Петербург (Умный Поиск Записи)</h2>
    <audio id="mainPlayer" controls style="width: 100%; margin-top: 15px;"></audio>
    <br><br>
    <button id="playBtn">Включить Радио</button>
    <div id="status">Статус: Остановлено</div>
</div>

<script>
const LIVE_STREAM = "https://radio.5-tv.ru/radio.mp3"; 

// Точные данные вашего репозитория
const GITHUB_USER = "vladislavtech84-cyber";
const GITHUB_REPO = "radio-player";

const player = document.getElementById('mainPlayer');
const playBtn = document.getElementById('playBtn');
const statusDiv = document.getElementById('status');

let checkInterval;
let isArchivePlaying = false;

playBtn.addEventListener('click', () => {
    if (player.paused) {
        startLiveRadio();
        playBtn.innerText = "Остановить";
        playBtn.style.background = "#dc3545";
        startTimelineChecking();
    } else {
        stopEverything();
    }
});

function startLiveRadio() {
    isArchivePlaying = false;
    player.removeAttribute('src'); 
    player.load();
    player.src = LIVE_STREAM;
    player.play().catch(e => console.log("Нажмите играть"));
    statusDiv.innerText = "РЕЖИМ: Живой прямой эфир";
    statusDiv.style.background = "#28a745";
    statusDiv.style.color = "#fff";
}

function stopEverything() {
    player.pause();
    player.src = "";
    playBtn.innerText = "Включить Радио";
    playBtn.style.background = "#28a745";
    statusDiv.innerText = "Статус: Остановлено";
    statusDiv.style.background = "#6c757d";
    clearInterval(checkInterval);
}

function startTimelineChecking() {
    clearInterval(checkInterval);
    checkInterval = setInterval(() => {
        // Проверяем репозиторий каждые 5 секунд
        if (!isArchivePlaying) {
            findAndPlayLatestArchive();
        }
    }, 5000); 
}

async function findAndPlayLatestArchive() {
    try {
        const response = await fetch(`https://github.com{GITHUB_USER}/${GITHUB_REPO}/contents/`);
        if (!response.ok) return;
        
        const files = await response.json();
        // Находим все файлы, имя которых начинается с part_
        const mp3Files = files.filter(f => f.name.startsWith('part_') && f.name.endsWith('.mp3'));
        
        if (mp3Files.length > 0) {
            // Сортируем список файлов по имени (последний окажется сверху)
            mp3Files.sort((a, b) => b.name.localeCompare(a.name));
            
            // ИСПРАВЛЕНО: Берём имя ПЕРВОГО файла из отсортированного списка
            const latestFileName = mp3Files[0].name; 

            isArchivePlaying = true;
            statusDiv.innerText = `РЕЖИМ: Воспроизведение записи (${latestFileName})`;
            statusDiv.style.background = "#6f42c1"; // Меняем статус на фиолетовый архива
            statusDiv.style.color = "#fff";
            
            player.removeAttribute('src');
            player.load();
            // Подставляем прямую ссылку на файл в GitHub Pages
            player.src = `https://${GITHUB_USER}.github.io/${GITHUB_REPO}/${latestFileName}?v=${new Date().getTime()}`;
            player.play().catch(e => console.log("Ошибка воспроизведения аудиофайла"));

            // После окончания проигрывания записи — автоматический возврат к радио
            player.onended = () => {
                player.onended = null;
                startLiveRadio();
            };
        }
    } catch (e) {
        console.log("Ошибка работы с GitHub API");
    }
}
</script>
</body>
</html>
