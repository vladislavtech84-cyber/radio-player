<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ТЕСТ: Ночной архив</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #111; color: #fff; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 500px; width: 100%; background: #222; padding: 30px; border-radius: 16px; box-shadow: 0 8px 25px rgba(0,0,0,0.7); text-align: center; margin-top: 40px; }
        .status-badge { display: inline-block; padding: 6px 16px; border-radius: 20px; font-size: 14px; font-weight: bold; margin-bottom: 20px; background: #00bcff; color: #fff; }
        audio { width: 100%; margin-top: 15px; border-radius: 8px; }
        .track-info { margin-top: 15px; font-size: 16px; color: #bbb; font-weight: 500; }
    </style>
</head>
<body>

<div class="container">
    <div id="mode-badge" class="status-badge">🌙 ВРЕМЕННЫЙ ТЕСТ АРХИВА</div>
    <h1 id="main-title">Ночной архив программ</h1>
    <audio id="global-player" controls autoplay></audio>
    <div id="current-track-name" class="track-info">Сканирование файлов...</div>
</div>

<script>
    const player = document.getElementById('global-player');
    const trackName = document.getElementById('current-track-name');
    let nightPlaylist = [];
    let currentTrackIndex = 0;

    async function fetchNightPlaylist() {
        const url = "https://github.com" + new Date().getTime();
        try {
            const response = await fetch(url);
            if (!response.ok) return;
            const files = await response.json();
            let mp3Files = files.filter(file => file.name.endsWith('.mp3') && file.name.startsWith('record_'));
            
            // Сортируем от старых к новым
            mp3Files.sort((a, b) => a.name.localeCompare(b.name));
            
            const newUrls = mp3Files.map(file => file.download_url);
            
            // Если появились новые файлы, обновляем плейлист в реальном времени
            if (JSON.stringify(newUrls) !== JSON.stringify(nightPlaylist)) {
                nightPlaylist = newUrls;
                if (player.paused && nightPlaylist.length > 0) {
                    currentTrackIndex = nightPlaylist.length - 1; // Включаем самый свежий тестовый файл
                    playNightTrack(currentTrackIndex);
                }
            }
            
            if (nightPlaylist.length === 0) {
                trackName.innerText = "Ожидание первой минутной записи от таймера Гитхаба...";
            }
        } catch (e) { console.error(e); }
    }

    function playNightTrack(index) {
        if (index < nightPlaylist.length) {
            trackName.innerText = `Играет минутный тест №${index + 1} из ${nightPlaylist.length}`;
            player.src = nightPlaylist[index];
            player.load();
            player.play().catch(e => console.log("Нажмите на плеер для активации звука"));
        } else {
            currentTrackIndex = 0;
            playNightTrack(0);
        }
    }

    player.onended = function() {
        currentTrackIndex++;
        playNightTrack(currentTrackIndex);
    };

    // Проверяем новые файлы каждые 15 секунд для быстрого теста
    setInterval(fetchNightPlaylist, 15000);
    fetchNightPlaylist();
</script>

</body>
</html>
