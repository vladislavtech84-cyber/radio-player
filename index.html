<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Радиоплеер — Тест фоновой записи</title>
</head>
<body>

    <h1>Радиоплеер</h1>
    
    <p id="status" style="font-weight: bold; color: green;">Статус: Прямой эфир</p>
    
    <!-- Основной плеер для пользователя -->
    <audio id="audio-player" controls src="https://radio.5-tv.ru/radio.mp3"></audio>

    <script>
        const audioPlayer = document.getElementById('audio-player');
        const statusText = document.getElementById('status');
        
        const STREAM_URL = "https://5-tv.ru";
        
        // === НАСТРОЙКА ТЕСТА ===
        // Укажите время старта фоновой записи (например, 13:10)
        const TARGET_HOUR = 13;
        const TARGET_MINUTE = 10;
        
        // Длительность записи в миллисекундах (5 минут = 300000)
        // Для быстрого теста выставлено 15000 (15 секунд), чтобы сразу проверить переключение
        const RECORD_TIME = 15000; 
        
        let mediaRecorder;
        let audioChunks = [];
        let isRecorded = false;

        // Таймер каждую секунду проверяет время на вашем компьютере
        const timeCheckInterval = setInterval(() => {
            const now = new Date();
            if (now.getHours() === TARGET_HOUR && now.getMinutes() === TARGET_MINUTE && !isRecorded) {
                isRecorded = true;
                clearInterval(timeCheckInterval); // Выключаем проверку, запускаем тест
                startBackgroundRecording();
            }
        }, 1000);

        async function startBackgroundRecording() {
            statusText.innerText = "Статус: Внимание! Началась фоновая запись (вы продолжаете слушать радио)...";
            statusText.style.color = "orange";

            try {
                // Создаем изолированный фоновый поток для записи, который не мешает основному плееру
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const streamDest = audioCtx.createMediaStreamDestination();
                
                const hiddenAudio = new Audio(STREAM_URL);
                hiddenAudio.crossOrigin = "anonymous";
                
                const source = audioCtx.createMediaElementSource(hiddenAudio);
                source.connect(streamDest);
                
                // Глушим звук скрытого плеера, чтобы не было эха (вы слышите только основной плеер)
                hiddenAudio.volume = 0; 
                hiddenAudio.play();

                mediaRecorder = new MediaRecorder(streamDest.stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = event => {
                    audioChunks.push(event.data);
                };

                mediaRecorder.onstop = () => {
                    hiddenAudio.pause();
                    statusText.innerText = "Статус: Запись завершена! Отключаем радио и включаем воспроизведение записи...";
                    statusText.style.color = "blue";

                    // Создаем аудиофайл из записанных в памяти кусочков
                    const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                    const audioUrl = URL.createObjectURL(audioBlob);

                    // Переключаем основной плеер на воспроизведение созданной записи
                    audioPlayer.src = audioUrl;
                    audioPlayer.play();

                    // Следим за окончанием проигрывания записи
                    audioPlayer.onended = () => {
                        statusText.innerText = "Статус: Запись доиграла. Возвращаем прямой эфир.";
                        statusText.style.color = "green";
                        
                        // Возвращаем поток радио и очищаем событие окончания
                        audioPlayer.src = STREAM_URL;
                        audioPlayer.onended = null;
                        audioPlayer.play();
                    };
                };

                // Запуск процесса записи
                mediaRecorder.start();

                // Автоматическая остановка записи по таймеру
                setTimeout(() => {
                    if (mediaRecorder && mediaRecorder.state === "recording") {
                        mediaRecorder.stop();
                    }
                }, RECORD_TIME);

            } catch (err) {
                console.error("Ошибка захвата потока:", err);
                statusText.innerText = "Статус: Браузер заблокировал фоновую запись из-за CORS-политики.";
                statusText.style.color = "red";
            }
        }
    </script>
</body>
</html>
