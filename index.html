<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Радио Петербург — Плеер</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .player-container {
            background-color: #1e1e1e;
            padding: 35px 30px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 320px;
        }
        h2 {
            font-size: 22px;
            margin-bottom: 5px;
            color: #00ff87;
            margin-top: 0;
        }
        .status {
            font-size: 13px;
            color: #888888;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        /* Удобная большая кнопка играть/пауза */
        .play-btn {
            background-color: #00ff87;
            color: #121212;
            border: none;
            padding: 16px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            outline: none;
            box-shadow: 0 4px 15px rgba(0, 255, 135, 0.3);
            margin-bottom: 20px;
        }
        .play-btn:hover {
            transform: scale(1.02);
            background-color: #00e175;
        }
        .playing {
            background-color: #ff3b30;
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(255, 59, 48, 0.3);
        }
        .archive-btn {
            display: inline-block;
            background-color: #2b2b2b;
            color: #ffffff;
            text-decoration: none;
            border: 1px solid #444;
            font-size: 14px;
            padding: 12px 20px;
            border-radius: 8px;
            width: 100%;
            box-sizing: border-box;
            transition: all 0.2s;
            margin-top: 10px;
        }
        .archive-btn:hover {
            border-color: #00ff87;
            background-color: #3d3d3d;
        }
    </style>
</head>
<body>

<div class="player-container">
    <h2>Радио Петербург</h2>
    <div class="status" id="status-text">🔴 ПРЯМОЙ ЭФИР</div>
    
    <!-- Кнопка управления -->
    <button class="play-btn" id="play-trigger" onclick="toggleRadio()">ВКЛЮЧИТЬ РАДИО</button>

    <!-- Кнопка архива GitHub -->
    <a href="https://github.com" target="_blank" class="archive-btn">📁 Открыть архив записей</a>
</div>

<script>
    // Создаем аудио-объект напрямую в оперативной памяти (Chrome не сможет его заблокировать)
    const audio = new Audio();
    audio.crossOrigin = "anonymous";
    
    // Прямой официальный медиа-поток Радио Петербург
    const streamUrl = "https://5-tv.ru";

    const button = document.getElementById('play-trigger');
    const statusText = document.getElementById('status-text');

    function toggleRadio() {
        if (audio.paused || audio.src === "") {
            // Подгружаем чистый поток без зависшего буфера
            audio.src = streamUrl;
            audio.load();
            
            audio.play()
                .then(() => {
                    button.textContent = 'ВЫКЛЮЧИТЬ';
                    button.classList.add('playing');
                    statusText.textContent = '🔊 В ЭФИРЕ...';
                })
                .catch(error => {
                    alert('Сеть перегружена. Нажмите кнопку ещё раз через секунду.');
                    console.error(error);
                });
        } else {
            audio.pause();
            // Полностью сбрасываем адрес, чтобы остановить скрытую загрузку мегабайтов в фоне
            audio.removeAttribute('src');
            audio.load();
            
            button.textContent = 'ВКЛЮЧИТЬ РАДИО';
            button.classList.remove('playing');
            statusText.textContent = '🔴 ПРЯМОЙ ЭФИР';
        }
    }
</script>

</body>
</html>
