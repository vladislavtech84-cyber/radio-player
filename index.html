<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Умный Радиоплеер с Таймером</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 40px; background: #1a1a2e; color: #fff; }
        .container { max-width: 550px; margin: 0 auto; background: #161625; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); border: 1px solid #007bff; }
        button { padding: 12px 24px; font-size: 15px; cursor: pointer; color: white; border: none; border-radius: 6px; font-weight: bold; margin: 5px; width: 100%; }
        .btn-live { background: #28a745; margin-bottom: 20px; }
        #status { margin-top: 25px; font-size: 15px; font-weight: bold; padding: 15px; background: #6c757d; border-radius: 6px; transition: all 0.3s ease; }
        .timer-info { margin-top: 15px; padding: 10px; background: #202035; border-radius: 6px; font-size: 14px; color: #ffc107; }
    </style>
</head>
<body>

<div class="container">
    <h2>Радио с переключением на Google Диск</h2>
    <audio id="audioEngine" controls style="width: 100%; margin-top: 15px;"></audio>
    <br><br>
    
    <button class="btn-live" id="liveBtn">Включить плеер</button>
    
    <div class="timer-info">
        ⏰ Текущее расписание проверки: <br>
        15:30 - 15:40 — Запись с Google Диска (Сухое Воздержание) <br>
        В остальное время — Прямой эфир Радио
    </div>

    <div id="status">Статус: Плеер остановлен</div>
</div>

<script>
// НАСТРОЙКИ ССЫЛОК
const LIVE_STREAM = "https://radio.5-tv.ru/radio.mp3";
// Ваша прямая ссылка на файл «Сухое Лечебное Воздержание»
const GOOGLE_DRIVE_FILE = "https://google.com";

const audioEngine = document.getElementById('audioEngine');
const liveBtn = document.getElementById('liveBtn');
const statusDiv = document.getElementById('status');

let checkInterval;
let currentMode = "stopped"; 

liveBtn.addEventListener('click', () => {
    if (currentMode === "stopped") {
        currentMode = "initializing";
        liveBtn.innerText = "Остановить плеер";
        liveBtn.style.background = "#dc3545";
        checkTimeAndPlay(); 
        startTimelineChecking();
    } else {
        clearInterval(checkInterval);
        audioEngine.pause();
        audioEngine.src = "";
        currentMode = "stopped";
        liveBtn.innerText = "Включить плеер";
        liveBtn.style.background = "#28a745";
        statusDiv.innerText = "Статус: Плеер остановлен";
        statusDiv.style.background = "#6c757d";
    }
});

function startTimelineChecking() {
    clearInterval(checkInterval);
    checkInterval = setInterval(() => {
        checkTimeAndPlay();
    }, 1000); 
}

function checkTimeAndPlay() {
    const now = new Date();
    const h = now.getHours();
    const m = now.getMinutes();

    // Условие включения: Час 15, минуты от 30 до 39 (ровно 10 минут)
    const isDriveTime = (h === 15 && m >= 30 && m < 40);

    if (isDriveTime) {
        if (currentMode !== "gdrive") {
            currentMode = "gdrive";
            switchSource(GOOGLE_DRIVE_FILE, "⚠️ РЕЖИМ: Трансляция файла с Google Диска (10 минут)", "#ffc107", "#000");
        }
    } else {
        if (currentMode !== "radio" && currentMode !== "stopped") {
            currentMode = "radio";
            switchSource(LIVE_STREAM, "📻 РЕЖИМ: Живой прямой эфир радио", "#28a745", "#fff");
        }
    }
}

function switchSource(url, statusText, bgColor, textColor = "#fff") {
    const wasPlaying = !audioEngine.paused || currentMode === "initializing";
    
    audioEngine.src = url;
    audioEngine.load();
    
    if (wasPlaying) {
        audioEngine.play().catch(e => console.log("Ошибка автозапуска: ", e));
    }
    
    statusDiv.innerText = statusText;
    statusDiv.style.background = bgColor;
    statusDiv.style.color = textColor;
}
</script>
</body>
</html>
