<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моё Онлайн Радио</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #121212; color: #fff; margin: 0; }
        .player-card { text-align: center; background: #1e1e1e; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h1 { font-size: 24px; margin-bottom: 20px; }
        audio { width: 100%; max-width: 300px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="player-card">
        <h1>Прямой эфир радио</h1>
        <!-- Тег audio напрямую цепляет и воспроизводит ваш поток -->
        <audio controls preload="none">
            <source src="https://radio.5-tv.ru/radio.mp3" type="audio/mpeg">
            Ваш браузер не поддерживает аудиоэлемент.
        </audio>
    </div>
</body>
</html>
