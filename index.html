<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Радио Петербург — Плеер</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .player-container {
            background-color: #1e1e1e;
            padding: 35px 30px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 320px;
        }
        h2 {
            font-size: 22px;
            margin-bottom: 5px;
            color: #00ff87;
            margin-top: 0;
        }
        .status {
            font-size: 13px;
            color: #888888;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        /* Стильный современный аудио-плеер прямо в карточке */
        audio {
            width: 100%;
            margin-bottom: 25px;
            border-radius: 30px;
            background: #2b2b2b;
        }
        .archive-btn {
            display: inline-block;
            background-color: #2b2b2b;
            color: #ffffff;
            text-decoration: none;
            border: 1px solid #444;
            font-size: 14px;
            padding: 12px 20px;
            border-radius: 8px;
            width: 100%;
            box-sizing: border-box;
            transition: all 0.2s;
        }
        .archive-btn:hover {
            border-color: #00ff87;
            background-color: #3d3d3d;
        }
    </style>
</head>
<body>

<div class="player-container">
    <h2>Радио Петербург</h2>
    <div class="status">🔴 ПРЯМОЙ ЭФИР</div>
    
    <!-- Безопасный HLS-поток Пятого Канала, встроенный напрямую в страницу -->
    <audio controls autoplay name="media">
        <source src="https://cdnvideo.ru" type="application/x-mpegURL">
        Your browser does not support the audio element.
    </audio>

    <!-- Ссылка на ваш архив на GitHub -->
    <a href="https://github.com" target="_blank" class="archive-btn">📁 Открыть архив записей</a>
</div>

</body>
</html>
