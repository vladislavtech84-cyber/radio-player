<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Радио Петербург и Облачный Плеер</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .player-container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 320px;
        }
        h2 {
            font-size: 22px;
            margin-bottom: 5px;
            color: #00ff87;
            margin-top: 0;
        }
        .status {
            font-size: 14px;
            color: #888888;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        /* Стилизация официального рабочего виджета под наш дизайн */
        .widget-wrapper {
            margin-bottom: 10px;
            display: flex;
            justify-content: center;
        }
        .archive-container {
            border-top: 1px solid #333;
            padding-top: 25px;
            margin-top: 25px;
        }
        .archive-title {
            font-size: 16px;
            color: #00ff87;
            margin-bottom: 15px;
            font-weight: bold;
        }
        .drive-btn {
            background-color: #2b2b2b;
            color: #ffffff;
            border: 1px solid #444;
            padding: 12px 20px;
            font-size: 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            text-decoration: none;
            display: inline-block;
            box-sizing: border-box;
        }
        .drive-btn:hover {
            background-color: #3d3d3d;
            border-color: #00ff87;
        }
    </style>
</head>
<body>

<div class="player-container">
    <!-- ЖИВОЙ ЭФИР -->
    <h2>Радио Петербург</h2>
    <div class="status">🔴 ПРЯМОЙ ЭФИР</div>
    
    <!-- Встроенный надежный виджет, который у вас работал -->
    <div class="widget-wrapper">
        <div class="RP-SCRIPT">
            <a class="RP-LINK" href="https://radiopotok.ru">Радио «Петербург»</a>
        </div>
        <script defer src="https://radiopotok.ru" charset="UTF-8"></script>
    </div>
    
    <!-- АРХИВ НА GITHUB -->
    <div class="archive-container">
        <div class="archive-title">ЗАПИСЬ ЭФИРА</div>
        <a href="https://github.com" 
           target="_blank" 
           class="drive-btn">
           📁 Открыть архив записей
        </a>
    </div>
</div>

</body>
</html>
