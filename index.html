<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Радиоплеер — Серверный тест</title>
</head>
<body>

    <h1>Радиоплеер</h1>
    <p id="status" style="font-weight: bold; color: green;">Статус: Прямой эфир</p>
    <audio id="audio-player" controls src="https://5-tv.ru"></audio>

    <script>
        const audioPlayer = document.getElementById('audio-player');
        const statusText = document.getElementById('status');
        const STREAM_URL = "https://radio.5-tv.ru/radio.mp3";

        // Ссылка на готовый файл в вашем репозитории (добавили случайный параметр, чтобы избежать кэша)
        const RECORDED_FILE_URL = "https://githubusercontent.com" + Date.now();

        let isPlayed = false;

        setInterval(() => {
            const now = new Date();
            const currentHour = now.getHours();
            const currentMinute = now.getMinutes();

            // В 13:50 сервер начал писать. В 13:55 запись готова — включаем её на сайте!
            if (currentHour === 13 && currentMinute === 55 && !isPlayed) {
                isPlayed = true;
                playRecordedFile();
            }
        }, 1000);

        function playRecordedFile() {
            statusText.innerText = "Статус: Серверная запись готова! Отключаем радио и включаем запись...";
            statusText.style.color = "blue";

            // Переключаем плеер на файл из GitHub
            audioPlayer.src = RECORDED_FILE_URL;
            audioPlayer.play();

            // Когда 5-минутный файл доиграет
            audioPlayer.onended = () => {
                statusText.innerText = "Статус: Запись доиграла. Возвращаем прямой эфир.";
                statusText.style.color = "green";
                
                audioPlayer.src = STREAM_URL;
                audioPlayer.onended = null;
                audioPlayer.play();
            };
        }
    </script>
</body>
</html>
