<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Радио Плеер — С записью</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0b1325;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .radio-container {
            text-align: center;
            background: #1e293b;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 350px;
        }
        h1 {
            font-size: 22px;
            color: #38bdf8;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .subtitle {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 25px;
        }
        audio {
            width: 100%;
            margin-bottom: 20px;
        }
        .record-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            background-color: #ef4444;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .record-btn:hover {
            background-color: #dc2626;
            transform: scale(1.02);
        }
        .record-btn.recording {
            background-color: #10b981;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
    <script src="js/script.js"></script>

    <div class="radio-container">
        <h1>Радио Плеер</h1>
        <div class="subtitle">Прямой эфир вещания</div>
        
        <!-- Оригинальный аудиопоток из вашего старого текста -->
        <audio id="radio" controls crossorigin="anonymous">
            <source src="https://hostingradio.ru" type="audio/aac">
            Ваш browser не поддерживает элемент audio.
        </audio>

        <button id="record-btn" class="record-btn">
            <span id="dot">🔴</span> <span id="text">Записать эфир</span>
        </button>
    </div>

    <script>
        // === НАСТРОЙКИ ДЛЯ СОХРАНЕНИЯ НА GITHUB ===
        const GITHUB_TOKEN = MY_SECRET_TOKEN; 
        const REPO_OWNER = 'vladislavtech84-cyber';
        const REPO_NAME = 'radio-player';
        const FOLDER_NAME = 'records'; 
        // ==========================================

        const audio = document.getElementById('radio');
        const recordBtn = document.getElementById('record-btn');
        const btnText = document.getElementById('text');
        const btnDot = document.getElementById('dot');

        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;
        let audioContext;
        let source;
        let streamDest;

        recordBtn.addEventListener('click', async () => {
            if (audio.paused) {
                alert('Сначала запустите воспроизведение радио!');
                return;
            }

            if (!isRecording) {
                try {
                    audioChunks = [];
                    
                    if (!audioContext) {
                        audioContext = new (window.AudioContext || window.webkitAudioContext)();
                        
                        if (audioContext.state === 'suspended') {
                            await audioContext.resume();
                        }
                        
                        source = audioContext.createMediaElementSource(audio);
                        streamDest = audioContext.createMediaStreamDestination();
                        source.connect(streamDest);
                        source.connect(audioContext.destination);
                    }

                    const mimeType = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/aac';
                    mediaRecorder = new MediaRecorder(streamDest.stream, { mimeType });
                    
                    mediaRecorder.ondataavailable = event => {
                        if (event.data.size > 0) audioChunks.push(event.data);
                    };

                    mediaRecorder.onstop = () => {
                        // Меняем текст кнопки на время загрузки в облако
                        btnText.textContent = 'Сохранение на GitHub...';
                        btnDot.textContent = '⏳';

                        const audioBlob = new Blob(audioChunks, { type: mimeType });
                        const ext = mimeType.includes('webm') ? 'webm' : 'aac';
                        
                        const now = new Date();
                        const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}-${String(now.getMinutes()).padStart(2,'0')}-${String(now.getSeconds()).padStart(2,'0')}`;
                        const fileName = `radio_record-${dateStr}.${ext}`;

                        // Перевод файла в Base64 для отправки через API
                        const reader = new FileReader();
                        reader.readAsDataURL(audioBlob);
                        reader.onloadend = async () => {
                            const base64Data = reader.result.split(',');
                            const url = `https://github.com{REPO_OWNER}/${REPO_NAME}/contents/${FOLDER_NAME}/${fileName}`;
                            
                            try {
                                const response = await fetch(url, {
                                    method: 'PUT',
                                    headers: {
                                        'Authorization': `token ${GITHUB_TOKEN}`,
                                        'Content-Type': 'application/json'
                                    },
                                    body: JSON.stringify({
                                        message: `Запись радио: ${fileName}`,
                                        content: base64Data
                                    })
                                });

                                if (response.ok) {
                                    alert(`Успешно! Файл добавлен в папку ${FOLDER_NAME}/${fileName}`);
                                } else {
                                    const errData = await response.json();
                                    console.error(errData);
                                    alert('Ошибка сохранения. Проверьте токен в config.js');
                                }
                            } catch (uploadErr) {
                                console.error(uploadErr);
                                alert('Сетевая ошибка при отправке файла на GitHub.');
                            } finally {
                                btnText.textContent = 'Записать эфир';
                                btnDot.textContent = '🔴';
                            }
                        };
                    };

                    mediaRecorder.start();
                    isRecording = true;
                    recordBtn.classList.add('recording');
                    btnText.textContent = 'Остановить и сохранить';
                    btnDot.textContent = '⏹️';
                } catch (err) {
                    console.error('Ошибка записи:', err);
                    alert('Не удалось начать запись.');
                }
            } else {
                mediaRecorder.stop();
                isRecording = false;
                recordBtn.classList.remove('recording');
            }
        });
    </script>
</body>
</html>
