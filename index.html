<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Радио Петербург — Автоматическое</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0b1325;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .radio-container {
            text-align: center;
            background: #1e293b;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 350px;
        }
        h1 {
            font-size: 22px;
            color: #38bdf8;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .subtitle {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 30px;
        }
        audio {
            width: 100%;
            margin-top: 10px;
            margin-bottom: 25px;
        }
        /* Красивая кнопка перехода */
        .go-btn {
            display: block;
            padding: 12px;
            background-color: #10b981;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 13px;
            transition: background 0.2s, transform 0.1s;
        }
        .go-btn:hover {
            background-color: #059669;
            transform: scale(1.02);
        }
    </style>
</head>
<body>

    <div class="radio-container">
        <h1>Радио Петербург</h1>
        <div class="subtitle">Прямой эфир вещания</div>
        
        <audio controls autoplay>
            <source src="https://5-tv.ru" type="audio/mpeg">
            Ваш браузер не поддерживает элемент audio.
        </audio>

        <!-- Кнопка, которая переведёт вас на страницу listen.html -->
        <a href="listen.html" class="go-btn">Открыть страницу Слушателя</a>
    </div>

</body>
</html>
