<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Радио Плеер — С записью</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0b1325;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .radio-container {
            text-align: center;
            background: #1e293b;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 350px;
        }
        h1 {
            font-size: 22px;
            color: #38bdf8;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .subtitle {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 25px;
        }
        audio {
            width: 100%;
            margin-bottom: 20px;
        }
        .record-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            background-color: #ef4444;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .record-btn:hover {
            background-color: #dc2626;
            transform: scale(1.02);
        }
        .record-btn.recording {
            background-color: #10b981;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="radio-container">
        <h1>Радио Плеер</h1>
        <div class="subtitle">Прямой эфир вещания</div>
        
        <!-- Оставили controls, чтобы вы могли управлять радио вручную -->
        <audio id="radio" controls crossorigin="anonymous">
            <source src="https://hostingradio.ru" type="audio/mpeg">
            Ваш браузер не поддерживает элемент audio.
        </audio>

        <button id="record-btn" class="record-btn">
            <span id="dot">🔴</span> <span id="text">Записать эфир</span>
        </button>
    </div>

    <script>
        const audio = document.getElementById('radio');
        const recordBtn = document.getElementById('record-btn');
        const btnText = document.getElementById('text');
        const btnDot = document.getElementById('dot');

        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;
        let audioContext;
        let source;
        let streamDest;

        recordBtn.addEventListener('click', async () => {
            // ШАГ 1: Принудительно запускаем аудио при клике, чтобы обойти блокировку Chrome
            if (audio.paused) {
                try {
                    await audio.play();
                } catch (playErr) {
                    console.log("Автозапуск заблокирован, пробуем запустить запись напрямую");
                }
            }

            if (!isRecording) {
                try {
                    audioChunks = [];
                    
                    // ШАГ 2: Активируем аудио-контекст строго ПОСЛЕ клика пользователя
                    if (!audioContext) {
                        audioContext = new (window.AudioContext || window.webkitAudioContext)();
                        source = audioContext.createMediaElementSource(audio);
                        streamDest = audioContext.createMediaStreamDestination();
                        source.connect(streamDest);
                        source.connect(audioContext.destination);
                    }

                    // Обязательно «будим» контекст, если он заснул
                    if (audioContext.state === 'suspended') {
                        await audioContext.resume();
                    }

                    mediaRecorder = new MediaRecorder(streamDest.stream);
                    
                    mediaRecorder.ondataavailable = event => {
                        if (event.data.size > 0) audioChunks.push(event.data);
                    };

                    mediaRecorder.onstop = () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                        const audioUrl = URL.createObjectURL(audioBlob);
                        const link = document.createElement('a');
                        link.href = audioUrl;
                        link.download = 'radio_record.mp3';
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                    };

                    mediaRecorder.start();
                    isRecording = true;
                    recordBtn.classList.add('recording');
                    btnText.textContent = 'Остановить и сохранить';
                    btnDot.textContent = '⏹️';
                } catch (err) {
                    console.error('Ошибка записи:', err);
                    alert('Не удалось запустить запись. Сначала включите радио кнопкой Play.');
                }
            } else {
                mediaRecorder.stop();
                isRecording = false;
                recordBtn.classList.remove('recording');
                btnText.textContent = 'Записать эфир';
                btnDot.textContent = '🔴';
            }
        });
    </script>

</body>
</html>
