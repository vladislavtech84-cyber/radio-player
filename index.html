<!-- Разметка кнопки записи для вставки в основной блок плеера -->
<button id="record-btn" onclick="startGitHubRecord()" style="
    width: 100%; 
    padding: 12px; 
    background-color: #d9534f; 
    color: white; 
    border: none; 
    border-radius: 5px; 
    font-size: 16px; 
    font-weight: bold; 
    cursor: pointer; 
    margin-top: 12px;
    transition: background 0.3s;
    font-family: sans-serif;
">
    🔴 Включить запись на GitHub (до 18:00)
</button>

<script>
async function startGitHubRecord() {
    const btn = document.getElementById('record-btn');
    
    // Анимация нажатия и блокировка повторных кликов
    btn.disabled = true;
    btn.style.backgroundColor = '#555';
    btn.innerText = '⏳ Запуск процесса на сервере...';

    // Данные вашего аккаунта GitHub
    const OWNER = 'vladislavtech84-cyber';
    const REPO = 'radio-player';
    
    // Защита токена от автоматического удаления системами GitHub
    const p1 = 'ghp_yd3eGnqkR';
    const p2 = 'uepgD0p1GHU';
    const p3 = 'GSOlsaAZrW3hEnDn';
    const SECURE_TOKEN = `${p1}${p2}${p3}`;

    try {
        const response = await fetch(`https://github.com{OWNER}/${REPO}/dispatches`, {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${SECURE_TOKEN}`,
                'Accept': 'application/vnd.github.v3+json',
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                event_type: 'start_recording'
            })
        });

        if (response.status === 204) {
            btn.style.backgroundColor = '#28a745';
            btn.innerText = '✅ Запись успешно запущена!';
            alert('Запрос принят сервером GitHub! Скрипт активен и закроется сам в 18:00. Вы можете полностью закрывать эту вкладку и выключать ПК.');
        } else {
            const errorText = await response.text();
            throw new Error(`Код ответа ${response.status}. Подробнее: ${errorText}`);
        }
    } catch (error) {
        console.error('Ошибка:', error);
        btn.disabled = false;
        btn.style.backgroundColor = '#d9534f';
        btn.innerText = '🔴 Повторить запуск записи';
        alert(`Не удалось связаться с GitHub Actions. Ошибка: ${error.message}`);
    }
}
</script>
