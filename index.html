<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Радио Петербург — Вещатель</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #0b1325; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .radio-container { text-align: center; background: #1e293b; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 350px; }
        h1 { font-size: 20px; color: #38bdf8; text-transform: uppercase; margin-bottom: 5px; }
        .subtitle { font-size: 13px; color: #94a3b8; margin-bottom: 25px; }
        audio { width: 100%; margin-bottom: 20px; }
        .key-box { background: #0f172a; padding: 10px; border-radius: 6px; font-family: monospace; font-size: 16px; color: #10b981; word-break: break-all; margin-top: 10px; }
    </style>
    <script src="https://unpkg.com"></script>
</head>
<body>

    <div class="radio-container">
        <h1>Радио (Вещатель)</h1>
        <div class="subtitle">Передача потока с GitHub</div>
        
        <audio id="radio" controls autoplay crossorigin="anonymous">
            <source src="https://suocast.com" type="audio/mpeg">
        </audio>

        <div>Ваш секретный ID для подключения:</div>
        <div id="peer-id" class="key-box">Создание ключа...</div>
    </div>

    <script>
        const audio = document.getElementById('radio');
        const peerIdDiv = document.getElementById('peer-id');

        // Подключаемся к стабильному публичному серверу вместо зависшего стандартного
        const peer = new Peer({
            host: '://peerjs.com',
            port: 443,
            path: '/',
            secure: true
        });

        peer.on('open', (id) => {
            peerIdDiv.textContent = id; 
        });

        peer.on('error', (err) => {
            console.error(err);
            peerIdDiv.textContent = "Ошибка. Переподключение...";
        });

        peer.on('call', (call) => {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioContext.createMediaElementSource(audio);
            const dest = audioContext.createMediaStreamDestination();
            
            source.connect(dest);
            source.connect(audioContext.destination);

            call.answer(dest.stream); 
        });
    </script>
</body>
</html>
