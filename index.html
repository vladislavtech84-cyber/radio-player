<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Радио Петербург и Облачный Плеер</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .player-container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 320px;
        }
        h2 {
            font-size: 22px;
            margin-bottom: 5px;
            color: #00ff87;
            margin-top: 0;
        }
        .status {
            font-size: 14px;
            color: #888888;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .play-btn {
            background-color: #00ff87;
            color: #121212;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            outline: none;
            box-shadow: 0 4px 12px rgba(0, 255, 135, 0.3);
        }
        .play-btn:hover {
            transform: scale(1.02);
            background-color: #00e175;
        }
        .play-btn:active {
            transform: scale(0.98);
        }
        .playing {
            background-color: #ff3b30;
            color: #ffffff;
            box-shadow: 0 4px 12px rgba(255, 59, 48, 0.3);
        }
        .playing:hover {
            background-color: #e03026;
        }
        .archive-container {
            border-top: 1px solid #333;
            padding-top: 25px;
            margin-top: 25px;
        }
        .archive-title {
            font-size: 16px;
            color: #00ff87;
            margin-bottom: 15px;
            font-weight: bold;
        }
        .drive-btn {
            background-color: #2b2b2b;
            color: #ffffff;
            border: 1px solid #444;
            padding: 12px 20px;
            font-size: 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            text-decoration: none;
            display: inline-block;
            box-sizing: border-box;
        }
        .drive-btn:hover {
            background-color: #3d3d3d;
            border-color: #00ff87;
        }
    </style>
</head>
<body>

<div class="player-container">
    <!-- ЖИВОЙ ЭФИР -->
    <h2>Радио Петербург</h2>
    <div class="status" id="status-text">🔴 ПРЯМОЙ ЭФИР</div>
    
    <!-- Большая кнопка играть/пауза -->
    <button class="play-btn" id="play-trigger" onclick="toggleRadio()">ВКЛЮЧИТЬ</button>
    
    <!-- Рабочий аудиопоток радиостанции -->
    <audio id="radio-player" src="https://hostingradio.ru" preload="none" crossorigin="anonymous"></audio>
    
    <!-- АРХИВ -->
    <div class="archive-container">
        <div class="archive-title">ЗАПИСЬ ЭФИРА</div>
        <a href="https://google.com" 
           target="_blank" 
           class="drive-btn">
           📁 Открыть архив на Диске
        </a>
    </div>
</div>

<script>
    const audio = document.getElementById('radio-player');
    const button = document.getElementById('play-trigger');
    const statusText = document.getElementById('status-text');

    function toggleRadio() {
        if (audio.paused) {
            // Перед запуском обновляем ссылку, чтобы не было задержки звука
            audio.src = 'https://hostingradio.ru';
            audio.play()
                .then(() => {
                    button.textContent = 'ВЫКЛЮЧИТЬ';
                    button.classList.add('playing');
                    statusText.textContent = '🔊 ВОСПРОИЗВЕДЕНИЕ...';
                })
                .catch(error => {
                    alert('Ошибка запуска потока. Проверьте интернет или обновите страницу.');
                    console.error(error);
                });
        } else {
            audio.pause();
            audio.src = ''; // Очищаем буфер
            button.textContent = 'ВКЛЮЧИТЬ';
            button.classList.remove('playing');
            statusText.textContent = '🔴 ПРЯМОЙ ЭФИР';
        }
    }
</script>

</body>
</html>
