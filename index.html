<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Радио Петербург — Ночной Архив</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background: #1a1a2e; color: #fff; }
        .container { max-width: 500px; margin: 0 auto; background: #161625; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); border: 1px solid #007bff; }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 6px; font-weight: bold; }
        #status { margin-top: 25px; font-size: 16px; font-weight: bold; padding: 15px; background: #28a745; border-radius: 6px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Радио Петербург (5 канал)</h2>
    <audio id="mainPlayer" controls style="width: 100%; margin-top: 15px;"></audio>
    <br><br>
    <button id="playBtn">Слушать Эфир</button>
    <div id="status">Статус: Остановлено</div>
</div>

<script>
const LIVE_STREAM = "https://radio.5-tv.ru/radio.mp3"; 

const player = document.getElementById('mainPlayer');
const playBtn = document.getElementById('playBtn');
const statusDiv = document.getElementById('status');

let checkInterval;

playBtn.addEventListener('click', () => {
    if (player.paused) {
        startLiveRadio();
        playBtn.innerText = "Остановить";
        startTimelineChecking();
    } else {
        player.pause();
        playBtn.innerText = "Слушать Эфир";
        statusDiv.innerText = "Статус: Остановлено";
        statusDiv.style.background = "#6c757d";
        clearInterval(checkInterval);
    }
});

function startLiveRadio() {
    player.src = LIVE_STREAM;
    player.play().catch(e => console.log("Нажмите играть"));
    statusDiv.innerText = "РЕЖИМ: Живой прямой эфир (Идет фоновая запись на сервере)";
    statusDiv.style.background = "#28a745";
}

function startTimelineChecking() {
    clearInterval(checkInterval);
    checkInterval = setInterval(() => {
        const now = new Date();
        const h = now.getHours();
        const m = now.getMinutes();
        const s = now.getSeconds();

        // Ровно в 01:00:00 ночи отключаем трансляцию и запускаем Архив (Часть 1)
        if (h === 1 && m === 0 && s === 0) {
            playArchivePart(1);
        }
    }, 1000);
}

function playArchivePart(partNumber) {
    statusDiv.innerText = `РЕЖИМ: Трансляция окончена. Играет Архив, Часть ${partNumber}`;
    statusDiv.style.background = "#ffc107";
    statusDiv.style.color = "#000";

    // Браузер загружает файл, который записал и сохранил облачный робот
    player.src = `part_${partNumber}.mp3?v=${new Date().getTime()}`; // Очистка кэша
    player.play().catch(e => console.log("Ошибка воспроизведения архива"));

    // Когда первая часть (3.5 часа) закончится, автоматически включится вторая
    player.onended = () => {
        if (partNumber === 1) {
            playArchivePart(2);
        } else {
            statusDiv.innerText = "РЕЖИМ: Архив полностью проигран. Ожидание дневного эфира.";
            statusDiv.style.background = "#007bff";
            statusDiv.style.color = "#fff";
            player.onended = null;
        }
    };
}
</script>
</body>
</html>
