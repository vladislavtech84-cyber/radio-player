<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Тест 10 минут: Эфир и Запись</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background: #1a1a2e; color: #fff; }
        .container { max-width: 500px; margin: 0 auto; background: #161625; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); border: 1px solid #007bff; }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 6px; font-weight: bold; }
        #status { margin-top: 25px; font-size: 16px; font-weight: bold; padding: 15px; background: #6c757d; border-radius: 6px; transition: 0.3s; }
    </style>
</head>
<body>

<div class="container">
    <h2>Тест: Радио Петербург (Умный Таймер)</h2>
    <audio id="mainPlayer" controls style="width: 100%; margin-top: 15px;"></audio>
    <br><br>
    <button id="playBtn">Включить Радио</button>
    <div id="status">Статус: Остановлено</div>
</div>

<script>
const LIVE_STREAM = "https://radio.5-tv.ru/radio.mp3"; 
const player = document.getElementById('mainPlayer');
const playBtn = document.getElementById('playBtn');
const statusDiv = document.getElementById('status');

let checkInterval;
let isArchivePlaying = false;

playBtn.addEventListener('click', () => {
    if (player.paused) {
        startLiveRadio();
        playBtn.innerText = "Остановить";
        playBtn.style.background = "#dc3545";
        startTimelineChecking();
    } else {
        player.pause();
        playBtn.innerText = "Включить Радио";
        playBtn.style.background = "#28a745";
        statusDiv.innerText = "Статус: Остановлено";
        statusDiv.style.background = "#6c757d";
        clearInterval(checkInterval);
    }
});

function startLiveRadio() {
    isArchivePlaying = false;
    player.src = LIVE_STREAM;
    player.play().catch(e => console.log("Нажмите играть"));
    statusDiv.innerText = "РЕЖИМ: Живой прямой эфир";
    statusDiv.style.background = "#28a745";
    statusDiv.style.color = "#fff";
}

function startTimelineChecking() {
    clearInterval(checkInterval);
    checkInterval = setInterval(() => {
        const now = new Date();
        const h = now.getHours();
        const m = now.getMinutes();
        const s = now.getSeconds();

        // С 12:40 до 12:49 показываем, что идет процесс в облаке
        if (h === 12 && m >= 40 && m < 50 && !isArchivePlaying) {
            statusDiv.innerText = "РЕЖИМ: Прямой эфир + [В облаке GitHub запущена запись...]";
            statusDiv.style.background = "#007bff";
        }

        // В 12:50 запускаем умную проверку файла
        if (h === 12 && m >= 50 && !isArchivePlaying) {
            tryToPlayArchive();
        }
    }, 1000);
}

// Умная функция: проверяет файл, если его нет — ждет и пробует снова, не прерывая радио
async function tryToPlayArchive() {
    const fileUrl = `part_1.mp3?v=${new Date().getTime()}`;
    
    statusDiv.innerText = "РЕЖИМ: Ожидание файла от GitHub Actions (может быть задержка сервера)...";
    statusDiv.style.background = "#ffc107";
    statusDiv.style.color = "#000";

    try {
        // Проверяем, существует ли файл физически на сервере GitHub
        const response = await fetch(fileUrl, { method: 'HEAD' });
        
        if (response.ok) {
            // Файл найден! Делаем рокировку звука
            isArchivePlaying = true;
            statusDiv.innerText = "РЕЖИМ: Запись успешно загружена! Играет архив (10 мин)";
            statusDiv.style.background = "#6f42c1"; // Фиолетовый статус для архива
            statusDiv.style.color = "#fff";
            
            player.src = fileUrl;
            player.play();

            // По окончании файла — возврат в эфир
            player.onended = () => {
                player.onended = null;
                startLiveRadio();
            };
        } else {
            // Файла еще нет (GitHub задерживает пуш), оставляем радио играть и пишем инфо
            statusDiv.innerText = "GitHub еще не сохранил файл. Радио продолжит играть до появления записи...";
            statusDiv.style.background = "#bc8f8f";
        }
    } catch (e) {
        console.log("Ожидание файла...");
    }
}
</script>
</body>
</html>
