<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Радио Петербург — Автоматическое</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0b1325;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .radio-container {
            text-align: center;
            background: #1e293b;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 350px;
        }
        h1 {
            font-size: 22px;
            color: #38bdf8;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .player-block {
            margin-bottom: 25px;
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #334155;
        }
        .subtitle {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 10px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }
        audio {
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="radio-container">
        <h1>Радио Петербург</h1>
        
        <!-- Блок 1: Прямой эфир -->
        <div class="player-block">
            <div class="subtitle" style="color: #ef4444;">🔴 ПРЯМОЙ ЭФИР (06:00 - 01:00)</div>
            <audio controls>
                <source src="https://5-tv.ru" type="audio/mpeg">
                Ваш браузер не поддерживает элемент audio.
            </audio>
        </div>

        <!-- Блок 2: Ночной архив -->
        <div class="player-block">
            <div class="subtitle" style="color: #10b981;">💾 ЗАПИСЬ ЭФИРА (01:00 - 06:00)</div>
            <audio controls>
                <source src="record.mp3" type="audio/mpeg">
                Запись еще не создана сервером.
            </audio>
        </div>
    </div>

</body>
</html>
