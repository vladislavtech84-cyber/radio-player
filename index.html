<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Радиоплеер — Автотест 14:10</title>
</head>
<body>

    <h1>Радиоплеер</h1>
    <p id="status" style="font-weight: bold; color: green;">Статус: Прямой эфир</p>
    <audio id="audio-player" controls src="https://radio.5-tv.ru/radio.mp3"></audio>

    <script>
        const audioPlayer = document.getElementById('audio-player');
        const statusText = document.getElementById('status');
        const STREAM_URL = "https://radio.5-tv.ru/radio.mp3";

        // Ссылка на файл через хостинг GitHub Pages (без CORS блокировок браузера)
        const RECORDED_FILE_URL = "https://github.io" + Date.now();

        let isPlayed = false;

        // Проверяем время каждую секунду
        setInterval(() => {
            const now = new Date();
            const currentHour = now.getHours();
            const currentMinute = now.getMinutes();

            // Сервер начнет писать в 14:10. В 14:15 запись завершится и файл обновится — включаем!
            if (currentHour === 14 && currentMinute === 15 && !isPlayed) {
                isPlayed = true;
                playRecordedFile();
            }
        }, 1000);

        function playRecordedFile() {
            statusText.innerText = "Статус: Серверная запись готова! Отключаем радио и включаем запись...";
            statusText.style.color = "blue";

            // Загружаем обновленный аудиофайл со звуком
            audioPlayer.src = RECORDED_FILE_URL;
            audioPlayer.play();

            // Когда 5-минутная запись полностью доиграет
            audioPlayer.onended = () => {
                statusText.innerText = "Статус: Прослушивание записи завершено. Возвращаем прямой эфир.";
                statusText.style.color = "green";
                
                audioPlayer.src = STREAM_URL;
                audioPlayer.onended = null;
                audioPlayer.play();
            };
        }
    </script>
</body>
</html>
