<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Радио Петербург — Слушатель</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0b1325;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .radio-container {
            text-align: center;
            background: #111827; /* Другой цвет, чтобы сразу отличить Слушателя */
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 350px;
            border: 1px solid #10b981; /* Зеленая рамка для Слушателя */
        }
        h1 {
            font-size: 22px;
            color: #10b981;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .subtitle {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 30px;
        }
        audio {
            width: 100%;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="radio-container">
        <h1>Радио (Слушатель)</h1>
        <div class="subtitle">Подключенная трансляция эфира</div>
        
        <!-- Используем строго тот же рабочий поток, что и на первой странице -->
        <audio controls autoplay>
            <source src="https://radio.5-tv.ru/radio.mp3" type="audio/mpeg">
            Ваш браузер не поддерживает элемент audio.
        </audio>
    </div>

</body>
</html>
