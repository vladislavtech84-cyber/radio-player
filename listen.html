<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Радио Петербург — Слушатель</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #0b1325; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .radio-container { text-align: center; background: #1e293b; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 350px; }
        h1 { font-size: 20px; color: #10b981; text-transform: uppercase; margin-bottom: 5px; }
        .subtitle { font-size: 13px; color: #94a3b8; margin-bottom: 25px; }
        input { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; text-align: center; font-size: 16px; margin-bottom: 15px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; background: #10b981; color: white; font-weight: bold; cursor: pointer; font-size: 15px; }
        button:hover { background: #059669; }
        audio { width: 100%; margin-top: 20px; display: none; }
    </style>
    <script src="https://unpkg.com"></script>
</head>
<body>

    <div class="radio-container">
        <h1>Радио (Слушатель)</h1>
        <div class="subtitle">Прием трансляции</div>
        
        <input type="text" id="host-id" placeholder="Вставьте ID вещателя">
        <button id="connect-btn">Подключиться к эфиру</button>

        <!-- Сюда потечет звук с первой страницы -->
        <audio id="remote-audio" controls autoplay></audio>
    </div>

    <script>
        const connectBtn = document.getElementById('connect-btn');
        const hostIdInput = document.getElementById('host-id');
        const remoteAudio = document.getElementById('remote-audio');

        const peer = new Peer();

        connectBtn.addEventListener('click', () => {
            const hostId = hostIdInput.value.trim();
            if (!hostId) {
                alert('Введите ID вещателя!');
                return;
            }

            // Создаем пустой медиапоток для инициализации вызова
            const fakeStream = new MediaStream();
            const call = peer.call(hostId, fakeStream);

            // Получаем аудиопоток от вещателя
            call.on('stream', (remoteStream) => {
                remoteAudio.srcObject = remoteStream;
                remoteAudio.style.display = 'block'; // Показываем плеер слушателю
                connectBtn.textContent = 'Вы в эфире!';
                connectBtn.style.background = '#38bdf8';
            });
        });
    </script>
</body>
</html>
